    id: IsModified
    path: src/nORM/Core/PropertyEntry.cs
    startLine: 50
  assemblies:
  - nORM
  namespace: nORM.Core
  summary: >-
    Whether this property is flagged modified — i.e. it will appear in the next UPDATE's SET clause.

    Getting reflects the tracked/computed change state; setting <code>true</code> forces the column into the

    UPDATE even if its value is unchanged, and <code>false</code> excludes it. Not settable for a key or

    concurrency-token column.
  example: []
  syntax:
    content: public bool IsModified { get; set; }
    parameters: []
    return:
      type: System.Boolean
    content.vb: Public Property IsModified As Boolean
  overload: nORM.Core.PropertyEntry.IsModified*
