  namespace: nORM.Core
  summary: >-
    Whether this property is flagged modified (will appear in the next UPDATE's SET clause). Setting true forces
    the column into the UPDATE even if unchanged; false excludes it. Not settable for a key or concurrency-token
    column.
  syntax:
    content: public bool IsModified { get; set; }
