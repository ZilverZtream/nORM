  namespace: nORM.Core
  summary: >-
    Access to a single mapped property of a tracked entity — its current value, its as-attached original value,
    and whether it is modified — the nORM equivalent of EF Core's PropertyEntry. Obtained from
    <xref href="nORM.Core.EntityEntry.Property(System.String)" data-throw-if-not-resolved="false"></xref>.
    Writing <xref href="nORM.Core.PropertyEntry.IsModified" data-throw-if-not-resolved="false"></xref> forces
    the column into (true) or excludes it from (false) the next partial-column UPDATE.
  syntax:
    content: public sealed class PropertyEntry
    content.vb: Public NotInheritable Class PropertyEntry
  inheritance:
  - System.Object
