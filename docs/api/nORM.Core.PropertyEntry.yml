  summary: >-
    Access to a single mapped property of a tracked entity — its current value, its as-attached original

    value, and whether it is modified — the nORM equivalent of EF Core's <code>PropertyEntry</code>. Obtained from

    <xref href="nORM.Core.EntityEntry.Property(System.String)" data-throw-if-not-resolved="false"></xref>. Writing <xref href="nORM.Core.PropertyEntry.IsModified" data-throw-if-not-resolved="false"></xref> forces the column into

    (<code>true</code>) or excludes it from (<code>false</code>) the next partial-column UPDATE, independent of whether

    its value actually changed.
