  assemblies:
  - nORM
  namespace: nORM.Core
  summary: >-
    Returns the SQL this query would execute, without running it — the equivalent of Entity Framework

    Core's <code>ToQueryString()</code>. Each parameter is listed as a leading comment (<code>-- @p0 = value</code>)

    so the statement is self-describing. Useful for debugging, logging, and comparing against

    hand-written SQL. The query is translated but never sent to the database.
  example: []
  syntax:
    content: public static string ToQueryString<T>(this IQueryable<T> source)
    parameters:
    - id: source
      type: System.Linq.IQueryable{{T}}
      description: A nORM query (from <code>context.Query&lt;T&gt;()</code>/<code>Set&lt;T&gt;()</code>/<code>FromSqlRaw</code>).
    typeParameters:
    - id: T
      description: The element type of the query.
    return:
      type: System.String
      description: The generated SQL, preceded by one comment line per parameter.
    content.vb: Public Shared Function ToQueryString(Of T)(source As IQueryable(Of T)) As String
