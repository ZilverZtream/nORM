  summary: >-
    Creates a queryable source for the specified entity type backed by the provided

    context. Alias for <xref href="nORM.Core.NormQueryable.Query%60%601(nORM.Core.DbContext)" data-throw-if-not-resolved="false"></xref>, provided for parity with the

    Entity Framework Core <code>DbContext.Set&lt;T&gt;()</code> entry point so that existing

    muscle memory works unchanged.
