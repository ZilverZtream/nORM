  assemblies:
  - nORM
  namespace: nORM.Core
  summary: >-
    Creates a prepared INSERT statement for the specified entity type. This allows

    the cost of SQL generation and command preparation to be paid only once, with

    subsequent executions only updating parameter values. Ideal for batch insert

    scenarios where the same operation is repeated many times.
  remarks: >-
    Example usage:


    <pre><code class="lang-csharp">await using var preparedInsert = await context.PrepareInsertAsync&lt;User&gt;();

    for (int i = 0; i &lt; users.Length; i++)

    {
        await preparedInsert.ExecuteAsync(users[i]);
    }</code></pre>
  example: []
  syntax:
    content: 'public Task<PreparedOperation<T>> PrepareInsertAsync<T>(CancellationToken ct = default, bool hydrateGeneratedKeys = true) where T : class'
    parameters:
    - id: ct
      type: System.Threading.CancellationToken
      description: Cancellation token for the operation.
    - id: hydrateGeneratedKeys
      type: System.Boolean
      description: When <code>false</code>, uses a plain <code>INSERT</code> shape and skips generated-key backfill.
    typeParameters:
    - id: T
      description: The entity type to prepare the insert for.
    return:
      type: System.Threading.Tasks.Task{nORM.Core.PreparedOperation{{T}}}
      description: A <xref href="nORM.Core.PreparedOperation%601" data-throw-if-not-resolved="false"></xref> that can be executed multiple times.
    content.vb: Public Function PrepareInsertAsync(Of T As Class)(ct As CancellationToken = Nothing, hydrateGeneratedKeys As Boolean = True) As Task(Of PreparedOperation(Of T))
