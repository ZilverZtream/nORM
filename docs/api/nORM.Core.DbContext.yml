  assemblies:
  - nORM
  namespace: nORM.Core
  summary: >-
    Releases a previously created savepoint within the provided transaction. Unlike a rollback, the work

    done since the savepoint is KEPT — the savepoint simply stops being a rollback target. Savepoints

    are released automatically when the transaction commits, so an explicit release is only needed to

    free the name (or resources) earlier.
  example: []
  syntax:
    content: public Task ReleaseSavepointAsync(DbTransaction transaction, string name, CancellationToken ct = default)
    parameters:
    - id: transaction
      type: System.Data.Common.DbTransaction
      description: The active database transaction.
    - id: name
      type: System.String
      description: Name of the savepoint to release.
    - id: ct
      type: System.Threading.CancellationToken
      description: Token used to cancel the asynchronous operation.
    return:
      type: System.Threading.Tasks.Task
      description: A task that completes when the savepoint has been released.
    content.vb: Public Function ReleaseSavepointAsync(transaction As DbTransaction, name As String, ct As CancellationToken = Nothing) As Task
