    startLine: 249
  assemblies:
  - nORM
  namespace: nORM.Core
  summary: >-
    Starts a COMPOSABLE query from a raw SQL statement: the SQL is wrapped as a derived table so the

    returned <xref href="System.Linq.IQueryable%601" data-throw-if-not-resolved="false"></xref> can be further composed with LINQ (<code>Where</code>, <code>OrderBy</code>,

    <code>Skip</code>/<code>Take</code>, projections, <code>Count</code>). The entity's global (soft-delete) and tenant

    filters are applied to the outer query — tenant is always enforced, the soft-delete filter is

    dropped by <code>IgnoreQueryFilters()</code> — so the SQL must SELECT the entity's columns (including the

    tenant column). Parameters are referenced positionally as <code>@p0</code>, <code>@p1</code>, … Unlike

    <xref href="nORM.Core.DbContext.FromSqlRawAsync%60%601(System.String%2cSystem.Threading.CancellationToken%2cSystem.Object%5b%5d)" data-throw-if-not-resolved="false"></xref> (which executes immediately and

    returns a list), this defers execution until the composed query is enumerated.
  example: []
  syntax:
    content: 'public IQueryable<T> FromSqlRaw<T>(string sql, params object[] parameters) where T : class'
    parameters:
    - id: sql
      type: System.String
    - id: parameters
      type: System.Object[]
    typeParameters:
    - id: T
    return:
      type: System.Linq.IQueryable{{T}}
    content.vb: Public Function FromSqlRaw(Of T As Class)(sql As String, ParamArray parameters As Object()) As IQueryable(Of T)
