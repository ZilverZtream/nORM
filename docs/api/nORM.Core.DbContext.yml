  assemblies:
  - nORM
  namespace: nORM.Core
  summary: >-
    Represents the primary entry point for interacting with a database using nORM.

    The <xref href="nORM.Core.DbContext" data-throw-if-not-resolved="false"></xref> manages the underlying <xref href="System.Data.Common.DbConnection" data-throw-if-not-resolved="false"></xref>,

    maintains metadata such as <xref href="nORM.Mapping.TableMapping" data-throw-if-not-resolved="false"></xref> instances and coordinates

    change tracking, transactions and provider specific behavior. Instances are

    intended to be short lived and not thread safe.
  example: []
  syntax:
    content: >-
      [RequiresDynamicCode("DbContext uses Expression-based query translation and reflection-built materializers; not NativeAOT-compatible. See docs/aot-trimming.md.")]

      [RequiresUnreferencedCode("DbContext reflects over entity types to build mappings; trimming may remove the required members.")]

      public class DbContext : IDisposable, IAsyncDisposable
    content.vb: >-
      <RequiresDynamicCode("DbContext uses Expression-based query translation and reflection-built materializers; not NativeAOT-compatible. See docs/aot-trimming.md.")>

      <RequiresUnreferencedCode("DbContext reflects over entity types to build mappings; trimming may remove the required members.")>

