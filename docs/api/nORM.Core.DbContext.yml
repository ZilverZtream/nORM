  namespace: nORM.Core
  summary: >-
    Override to configure the model with the fluent API (Entity Framework Core parity). Called once

    during construction, after the <xref href="nORM.Configuration.DbContextOptions.OnModelCreating" data-throw-if-not-resolved="false"></xref> delegate, so a derived

    context can place its mapping in an override instead of an options lambda:


    <pre><code class="lang-csharp">protected override void OnModelCreating(ModelBuilder modelBuilder)
            =&gt; modelBuilder.Entity&lt;User&gt;().HasKey(u =&gt; u.Id);</code></pre>

    The base implementation does nothing. Both the options delegate and this override run, in that order,

    so either or both may be used.
