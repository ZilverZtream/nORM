    startLine: 70
  assemblies:
  - nORM
  namespace: nORM.Core
  summary: >-
    Persists all tracked changes to the database. The operation is executed

    using the configured retry policy which transparently retries transient

    failures such as deadlocks.
  remarks: >-
    <p>

    Automatically calls DetectChanges() which performs snapshot-based comparison of ALL

    tracked entities. Avoid calling SaveChanges() in tight loops with many tracked entities.

    For bulk operations, use InsertBulkAsync() or UpdateBulkAsync() instead. For read-only

    queries, use AsNoTracking() to avoid change tracking overhead entirely.

    </p>

    <p>

    <b>Async-first:</b> nORM does not provide a synchronous <code>SaveChanges()</code> method.

    Always use <code>await ctx.SaveChangesAsync()</code>. Blocking with

    <code>.GetAwaiter().GetResult()</code> can cause deadlocks in synchronization contexts

    such as ASP.NET classic or WPF.

    </p>
  example: []
  syntax:
    content: public Task<int> SaveChangesAsync(CancellationToken ct = default)
    parameters:
    - id: ct
      type: System.Threading.CancellationToken
      description: Token used to cancel the asynchronous operation.
    return:
      type: System.Threading.Tasks.Task{System.Int32}
      description: The total number of state entries written to the database.
    content.vb: Public Function SaveChangesAsync(ct As CancellationToken = Nothing) As Task(Of Integer)
  overload: nORM.Core.DbContext.SaveChangesAsync*
