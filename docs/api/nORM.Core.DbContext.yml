  assemblies:
  - nORM
  namespace: nORM.Core
  summary: >-
    Returns the <xref href="nORM.Core.EntityEntry" data-throw-if-not-resolved="false"></xref> for the supplied entity if it is already being tracked.

    If the entity is not tracked, an exception is thrown instructing the caller to use

    <xref href="nORM.Core.DbContext.Attach%60%601(%60%600)" data-throw-if-not-resolved="false"></xref> explicitly. Auto-attaching is deliberately not supported because

    it is a dangerous side-effect that can silently modify tracking state.
  example: []
  syntax:
    content: public EntityEntry Entry(object entity)
    parameters:
    - id: entity
      type: System.Object
      description: The entity whose tracking entry is requested.
    return:
      type: nORM.Core.EntityEntry
      description: An <xref href="nORM.Core.EntityEntry" data-throw-if-not-resolved="false"></xref> representing the entity's tracking information.
    content.vb: Public Function Entry(entity As Object) As EntityEntry
  overload: nORM.Core.DbContext.Entry*
  exceptions:
  - type: System.ArgumentException
    commentId: T:System.ArgumentException
    description: Thrown when <code class="paramref">entity</code> is null or invalid.
  - type: System.InvalidOperationException
    commentId: T:System.InvalidOperationException
    description: Thrown when the entity is not currently tracked.
  nameWithType.vb: DbContext.Entry(Object)
  fullName.vb: nORM.Core.DbContext.Entry(Object)
  name.vb: Entry(Object)
