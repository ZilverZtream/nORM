  assemblies:
  - nORM
  namespace: nORM.Core
  summary: >-
    Asynchronously begins tracking the entity in the <xref href="nORM.Core.EntityState.Added" data-throw-if-not-resolved="false"></xref> state,

    matching EF Core's <code>AddAsync</code>. nORM assigns database-generated keys at <code>SaveChanges</code>

    (not at add time), so this completes synchronously — the async signature exists for source

    compatibility with EF code.
  example: []
  syntax:
    content: 'public ValueTask<EntityEntry> AddAsync<T>(T entity, CancellationToken ct = default) where T : class'
    parameters:
    - id: entity
      type: '{T}'
      description: The entity instance to add.
    - id: ct
      type: System.Threading.CancellationToken
      description: Token used to cancel the operation.
    typeParameters:
    - id: T
      description: CLR type of the entity.
    return:
      type: System.Threading.Tasks.ValueTask{nORM.Core.EntityEntry}
      description: An <xref href="nORM.Core.EntityEntry" data-throw-if-not-resolved="false"></xref> representing the tracked entity.
    content.vb: Public Function AddAsync(Of T As Class)(entity As T, ct As CancellationToken = Nothing) As ValueTask(Of EntityEntry)
