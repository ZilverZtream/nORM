    id: Strict
    path: src/nORM/Configuration/DbContextOptions.cs
    startLine: 83
  assemblies:
  - nORM
  namespace: nORM.Configuration
  summary: >-
    Permit only generated nORM paths whose semantics are translated,

    emulated or rejected deterministically by nORM before execution.

    Provider-bound escape hatches throw <xref href="nORM.Core.NormUnsupportedFeatureException" data-throw-if-not-resolved="false"></xref>.
  example: []
  syntax:
    content: Strict = 1
    return:
      type: nORM.Configuration.ProviderMobilityMode
