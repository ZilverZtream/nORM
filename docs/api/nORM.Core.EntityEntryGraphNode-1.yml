  summary: >-
    A node visited during the stateful

    <xref href="nORM.Core.ChangeTracker.TrackGraph%60%601(System.Object%2c%60%600%2cSystem.Func%7bnORM.Core.EntityEntryGraphNode%7b%60%600%7d%2cSystem.Boolean%7d)" data-throw-if-not-resolved="false"></xref>,

    carrying the caller's <code class="typeparamref">TState</code> alongside the entry, its source, and the inbound

    navigation (Entity Framework Core parity). The callback assigns <xref href="nORM.Core.EntityEntry.State" data-throw-if-not-resolved="false"></xref> on

    <xref href="nORM.Core.EntityEntryGraphNode%601.Entry" data-throw-if-not-resolved="false"></xref> to track the entity, and returns whether the traversal should descend into this

    entity's own navigations.
