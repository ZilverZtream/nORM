  assemblies:
  - nORM
  namespace: nORM.Core
  summary: >-
    A human-readable snapshot of the entities a <xref href="nORM.Core.ChangeTracker" data-throw-if-not-resolved="false"></xref> is tracking, for debugging —

    the nORM equivalent of EF Core's <code>ChangeTracker.DebugView</code>. <xref href="nORM.Core.DebugView.ShortView" data-throw-if-not-resolved="false"></xref> is one line per

    tracked entity (type, primary key, state); <xref href="nORM.Core.DebugView.LongView" data-throw-if-not-resolved="false"></xref> additionally lists each mapped

    property's current value, marks key properties with <code>PK</code>, and shows the original value of a

    modified property. This is a pure read of the tracker's current state — call

    <xref href="nORM.Core.ChangeTracker.DetectChanges" data-throw-if-not-resolved="false"></xref> first if you want states refreshed against pending edits.
