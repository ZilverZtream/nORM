  namespace: nORM.Core
  summary: >-
    A human-readable snapshot of the entities tracked by a <xref href="nORM.Core.ChangeTracker" data-throw-if-not-resolved="false"></xref>,
    for debugging — the nORM equivalent of EF Core's ChangeTracker.DebugView. <xref href="nORM.Core.DebugView.ShortView" data-throw-if-not-resolved="false"></xref>
    is one line per tracked entity (type, key, state); <xref href="nORM.Core.DebugView.LongView" data-throw-if-not-resolved="false"></xref>
    additionally lists each mapped property's value, marks key properties, and shows the original value of a modified property.
