    parameters:
    - id: historyTableName
      type: System.String
      description: Name of the migration history table. Defaults to <code>__NormMigrationsHistory</code>.
    - id: lockName
      type: System.String
      description: Name of the migration advisory lock for providers that use named locks. Defaults to <code>__NormMigrationsLock</code>.
    - id: lockTimeout
      type: System.Nullable{System.TimeSpan}
      description: Maximum time to wait for advisory-lock acquisition. Defaults to 30 seconds.
    - id: postgresAdvisoryLockKey
      type: System.Nullable{System.Int64}
      description: PostgreSQL advisory-lock key. Defaults to nORM's stable key.
