  summary: >-
    A query over an entity type that also exposes the change-tracking write verbs

    (<xref href="nORM.Core.DbSet%601.Add(%600)" data-throw-if-not-resolved="false"></xref> / <xref href="nORM.Core.DbSet%601.Remove(%600)" data-throw-if-not-resolved="false"></xref> / <xref href="nORM.Core.DbSet%601.Update(%600)" data-throw-if-not-resolved="false"></xref> / <xref href="nORM.Core.DbSet%601.Attach(%600)" data-throw-if-not-resolved="false"></xref> /

    <xref href="nORM.Core.DbSet%601.Find(System.Object%5b%5d)" data-throw-if-not-resolved="false"></xref>), matching Entity Framework Core's <code>DbSet&lt;TEntity&gt;</code>. Obtain one from

    <code>context.Set&lt;T&gt;()</code>, or expose it as a context property for EF-style access:


    <pre><code class="lang-csharp">public sealed class AppContext : DbContext

    {
        public AppContext(DbConnection cn, DatabaseProvider p) : base(cn, p) { }
        public DbSet&lt;User&gt; Users =&gt; this.Set&lt;User&gt;();   // context.Users.Where(...) / context.Users.Add(...)
    }</code></pre>


    The computed-property form needs no reflection or auto-population (unlike EF Core's auto-populated

    set properties), but querying it and <xref href="nORM.Core.DbSet%601.Find(System.Object%5b%5d)" data-throw-if-not-resolved="false"></xref> reflect over entity metadata to build SQL

    like all nORM data access, so those members carry the trimming/NativeAOT annotations.

    It is a full <xref href="nORM.Core.INormQueryable%601" data-throw-if-not-resolved="false"></xref>, so <code>Include</code>/<code>AsNoTracking</code>/<code>AsSplitQuery</code>

    and the async terminal operators compose off it without a cast, exactly as off <code>context.Query&lt;T&gt;()</code>;

    the write verbs delegate to the context's change tracker and apply on the next <code>SaveChangesAsync</code>.
