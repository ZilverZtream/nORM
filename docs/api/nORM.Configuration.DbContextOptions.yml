- uid: nORM.Configuration.DbContextOptions.MaxQueryComplexityCost
  commentId: P:nORM.Configuration.DbContextOptions.MaxQueryComplexityCost
  id: MaxQueryComplexityCost
  parent: nORM.Configuration.DbContextOptions
  langs:
  - csharp
  - vb
  name: MaxQueryComplexityCost
  nameWithType: DbContextOptions.MaxQueryComplexityCost
  fullName: nORM.Configuration.DbContextOptions.MaxQueryComplexityCost
  type: Property
  source:
    remote:
      path: src/nORM/Configuration/DbContextOptions.cs
      branch: main
      repo: https://github.com/ZilverZtream/nORM.git
    id: MaxQueryComplexityCost
    path: src/nORM/Configuration/DbContextOptions.cs
    startLine: 239
  assemblies:
  - nORM
  namespace: nORM.Configuration
  summary: >-
    Gets or sets an explicit ceiling for the estimated complexity cost above which query

    translation is rejected. When null (the default), the ceiling scales with available

    system memory (10,000 per GB, clamped between 1 and 16 GB). The cost model weighs

    joins quadratically, so report-style queries with many joins are the most common

    reason to set an explicit ceiling. A warning is logged when a query exceeds half

    the effective ceiling.
  example: []
  syntax:
    content: public int? MaxQueryComplexityCost { get; set; }
    parameters: []
    return:
      type: System.Nullable{System.Int32}
    content.vb: Public Property MaxQueryComplexityCost As Integer?
  overload: nORM.Configuration.DbContextOptions.MaxQueryComplexityCost*
