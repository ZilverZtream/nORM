  source:
    remote:
      path: src/nORM/Configuration/DbContextOptions.cs
      branch: main
      repo: https://github.com/ZilverZtream/nORM.git
    id: MaxRecursionDepth
    path: src/nORM/Configuration/DbContextOptions.cs
    startLine: 161
  assemblies:
  - nORM
  namespace: nORM.Configuration
  summary: >-
    Gets or sets the maximum LINQ expression tree translation depth (recursion limit).

    Default: 50. Maximum: 200. Raise this value for complex query builders that produce

    deep nested LINQ trees (e.g., report composers with 30+ conditions). If you reach

    this limit, consider breaking the query into multiple simpler queries or using CTEs.
  example: []
  syntax:
    content: public int MaxRecursionDepth { get; set; }
    parameters: []
    return:
      type: System.Int32
    content.vb: Public Property MaxRecursionDepth As Integer
  overload: nORM.Configuration.DbContextOptions.MaxRecursionDepth*
- uid: nORM.Configuration.DbContextOptions.MaxQueryJoinDepth
  commentId: P:nORM.Configuration.DbContextOptions.MaxQueryJoinDepth
  id: MaxQueryJoinDepth
  parent: nORM.Configuration.DbContextOptions
  langs:
  - csharp
  - vb
  name: MaxQueryJoinDepth
  nameWithType: DbContextOptions.MaxQueryJoinDepth
  fullName: nORM.Configuration.DbContextOptions.MaxQueryJoinDepth
  type: Property
  source:
    remote:
      path: src/nORM/Configuration/DbContextOptions.cs
      branch: main
      repo: https://github.com/ZilverZtream/nORM.git
    id: MaxQueryJoinDepth
    path: src/nORM/Configuration/DbContextOptions.cs
    startLine: 181
  assemblies:
  - nORM
  namespace: nORM.Configuration
  summary: >-
    Gets or sets an explicit upper bound on the number of joins a single query may

    contain before translation is rejected. When null (the default), the limit scales

    with available system memory (10 joins per GB, clamped between 1 and 16 GB), which

    means the same query can be admitted on one machine and rejected on a smaller one.

    Set an explicit value for deterministic admission across environments.
  example: []
  syntax:
    content: public int? MaxQueryJoinDepth { get; set; }
    parameters: []
    return:
      type: System.Nullable{System.Int32}
    content.vb: Public Property MaxQueryJoinDepth As Integer?
  overload: nORM.Configuration.DbContextOptions.MaxQueryJoinDepth*
