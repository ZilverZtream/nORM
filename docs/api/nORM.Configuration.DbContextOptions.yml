- uid: nORM.Configuration.DbContextOptions.RequireMatchedRowOccSemantics
  commentId: P:nORM.Configuration.DbContextOptions.RequireMatchedRowOccSemantics
  id: RequireMatchedRowOccSemantics
  parent: nORM.Configuration.DbContextOptions
  langs:
  - csharp
  - vb
  name: RequireMatchedRowOccSemantics
  nameWithType: DbContextOptions.RequireMatchedRowOccSemantics
  fullName: nORM.Configuration.DbContextOptions.RequireMatchedRowOccSemantics
  type: Property
  source:
    remote:
      path: src/nORM/Configuration/DbContextOptions.cs
      branch: main
      repo: https://github.com/ZilverZtream/nORM.git
    id: RequireMatchedRowOccSemantics
    path: src/nORM/Configuration/DbContextOptions.cs
    startLine: 632
  assemblies:
  - nORM
  namespace: nORM.Configuration
  summary: >-
    When <a href="https://learn.microsoft.com/dotnet/csharp/language-reference/builtin-types/bool">true</a> (default), using <code>[Timestamp]</code> OCC columns with a

    provider that uses affected-row semantics (e.g. MySQL with <code>useAffectedRows=true</code>)

    causes <xref href="nORM.Core.NormConfigurationException" data-throw-if-not-resolved="false"></xref> to be thrown at save time, preventing

    silent data-loss bugs.
  remarks: >-
    <p><b>⚠ ADVANCED UNSAFE MODE:</b> Setting this to <a href="https://learn.microsoft.com/dotnet/csharp/language-reference/builtin-types/bool">false</a> is an

    explicit opt-in to weakened OCC semantics. With affected-row MySQL semantics, a

    concurrent writer that updates a row to the <em>same</em> token value will NOT be

    detected as a conflict — the update will silently succeed even though the row was

    modified externally. This is a known data-integrity gap (audit finding SP1).</p>

    <p>Only disable this if you have verified that your workload cannot produce same-value

    token collisions, or if you are using a SELECT-then-verify strategy to compensate.

    Add <code>useAffectedRows=false</code> to the MySQL connection string for full OCC guarantees

    instead.</p>
