    id: UseStrictProviderMobility
    path: src/nORM/Configuration/DbContextOptions.cs
    startLine: 531
  assemblies:
  - nORM
  namespace: nORM.Configuration
  summary: >-
    Enforces nORM's strict provider mobility contract for this context.

    In strict mode, generated nORM query/write/temporal paths may translate,

    emulate or fail deterministically, while raw SQL, stored procedures,

    provider-native RLS and provider-native temporal storage are rejected.

    Client projection tails remain rejected by default; callers may opt

    into <xref href="nORM.Configuration.ClientEvaluationPolicy.Warn" data-throw-if-not-resolved="false"></xref> for

    explicit top-level projection tails after server filters, ordering and

    paging have run.
  example: []
  syntax:
    content: public DbContextOptions UseStrictProviderMobility()
    return:
      type: nORM.Configuration.DbContextOptions
      description: The current <xref href="nORM.Configuration.DbContextOptions" data-throw-if-not-resolved="false"></xref> instance for chaining.
    content.vb: Public Function UseStrictProviderMobility() As DbContextOptions
  overload: nORM.Configuration.DbContextOptions.UseStrictProviderMobility*
