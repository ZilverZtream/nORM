  assemblies:
  - nORM
  namespace: nORM.Configuration
  summary: >-
    Applies a dedicated <xref href="nORM.Configuration.IEntityTypeConfiguration%601" data-throw-if-not-resolved="false"></xref> to this model — the Entity

    Framework Core pattern for keeping per-entity configuration in its own class. The configuration's

    <xref href="nORM.Configuration.IEntityTypeConfiguration%601.Configure(nORM.Configuration.EntityTypeBuilder%7b%600%7d)" data-throw-if-not-resolved="false"></xref> runs against the same builder that

    <xref href="nORM.Configuration.ModelBuilder.Entity%60%601" data-throw-if-not-resolved="false"></xref> returns, so it accumulates with any other configuration for the type.
  example: []
  syntax:
    content: 'public ModelBuilder ApplyConfiguration<TEntity>(IEntityTypeConfiguration<TEntity> configuration) where TEntity : class'
    parameters:
    - id: configuration
      type: nORM.Configuration.IEntityTypeConfiguration{{TEntity}}
      description: The configuration to apply.
    typeParameters:
    - id: TEntity
      description: The entity type being configured.
    return:
      type: nORM.Configuration.ModelBuilder
      description: This <xref href="nORM.Configuration.ModelBuilder" data-throw-if-not-resolved="false"></xref> for chaining.
    content.vb: Public Function ApplyConfiguration(Of TEntity As Class)(configuration As IEntityTypeConfiguration(Of TEntity)) As ModelBuilder
  overload: nORM.Configuration.ModelBuilder.ApplyConfiguration*
  exceptions:
  - type: System.ArgumentNullException
    commentId: T:System.ArgumentNullException
    description: Thrown when <code class="paramref">configuration</code> is null.
