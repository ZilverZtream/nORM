  assemblies:
  - nORM
  namespace: nORM.Configuration
  summary: >-
    Begins configuration for the specified entity CLR type.

    Repeated calls for the same type return the same builder so that

    multiple chained configurations are accumulated rather than replaced.
  example: []
  syntax:
    content: 'public EntityTypeBuilder<TEntity> Entity<TEntity>() where TEntity : class'
    typeParameters:
    - id: TEntity
      description: The entity type to configure.
    return:
      type: nORM.Configuration.EntityTypeBuilder{{TEntity}}
      description: An <xref href="nORM.Configuration.EntityTypeBuilder%601" data-throw-if-not-resolved="false"></xref> for configuring the entity.
    content.vb: Public Function Entity(Of TEntity As Class)() As EntityTypeBuilder(Of TEntity)
