  summary: >-
    Adds a parameter to the command, attempting to infer the optimal <xref href="System.Data.DbType" data-throw-if-not-resolved="false"></xref> and

    size based on the supplied value. When a <code class="paramref">knownType</code> is provided and the

    value is <code>null</code>, the mapping is still applied to avoid provider ambiguity.
  example: []
  syntax:
    content: public static void AddOptimizedParam(this DbCommand cmd, string name, object? value, Type? knownType = null)
    parameters:
    - id: cmd
      type: System.Data.Common.DbCommand
      description: The command to which the parameter is added.
    - id: name
      type: System.String
      description: The parameter name including prefix (e.g. <code>@Id</code>).
    - id: value
      type: System.Object
      description: The value to bind to the parameter.
    - id: knownType
      type: System.Type
      description: Optional type hint used when <code class="paramref">value</code> is <code>null</code>.
    content.vb: Public Shared Sub AddOptimizedParam(cmd As DbCommand, name As String, value As Object, knownType As Type = Nothing)
