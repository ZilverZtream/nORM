    id: AddParam
    path: src/nORM/Internal/ParameterOptimizer.cs
    startLine: 370
  assemblies:
  - nORM
  namespace: nORM.Internal
  summary: >-
    Adds a parameter to the command, inferring the <xref href="System.Data.DbType" data-throw-if-not-resolved="false"></xref> from the runtime

    type of <code class="paramref">value</code>. Equivalent to calling

    <xref href="nORM.Internal.ParameterOptimizer.AddOptimizedParam(System.Data.Common.DbCommand%2cSystem.String%2cSystem.Object%2cSystem.Type)" data-throw-if-not-resolved="false"></xref> with no <code>knownType</code>.

    For typed-null parameters (value is <code>null</code> but the column type is known), prefer

    <xref href="nORM.Internal.ParameterOptimizer.AddOptimizedParam(System.Data.Common.DbCommand%2cSystem.String%2cSystem.Object%2cSystem.Type)" data-throw-if-not-resolved="false"></xref> with an explicit type hint

    to avoid provider ambiguity on the null binding. (A-1 fix: corrected misleading doc that

    said "without additional type metadata" — type IS inferred from value.GetType().)
  example: []
  syntax:
    content: public static void AddParam(this DbCommand cmd, string name, object? value)
    parameters:
    - id: cmd
      type: System.Data.Common.DbCommand
      description: The command to which the parameter is added.
    - id: name
      type: System.String
      description: The parameter name including prefix.
    - id: value
      type: System.Object
      description: The value to bind to the parameter.
    content.vb: Public Shared Sub AddParam(cmd As DbCommand, name As String, value As Object)
  overload: nORM.Internal.ParameterOptimizer.AddParam*
  nameWithType.vb: ParameterOptimizer.AddParam(DbCommand, String, Object)
  fullName.vb: nORM.Internal.ParameterOptimizer.AddParam(System.Data.Common.DbCommand, String, Object)
  name.vb: AddParam(DbCommand, String, Object)
