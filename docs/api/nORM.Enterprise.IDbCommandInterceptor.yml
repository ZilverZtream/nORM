    id: IDbCommandInterceptor
    path: src/nORM/Enterprise/IDbCommandInterceptor.cs
    startLine: 28
  assemblies:
  - nORM
  namespace: nORM.Enterprise
  summary: >-
    Defines hooks that are invoked before and after execution of <xref href="System.Data.Common.DbCommand" data-throw-if-not-resolved="false"></xref> instances.

    Implementations may inspect or modify the command, short-circuit execution, or react to failures.
  remarks: >-
    Two contract tiers are provided:


    <ul><li><span class="term">Async (…Async methods)</span>Invoked from all async execution paths.
        Implementations may freely use <code>await</code>.</li><li><span class="term">Sync (non-Async methods)</span>Invoked from synchronous execution
        paths (e.g. <code>ToList()</code>). Default implementations are no-ops. Override these when
        synchronous interception is needed; do <em>not</em> block on async work from these
        implementations as doing so can deadlock single-threaded
        <xref href="System.Threading.SynchronizationContext" data-throw-if-not-resolved="false"></xref> environments.</li></ul>
  example: []
  syntax:
    content: public interface IDbCommandInterceptor
    content.vb: Public Interface IDbCommandInterceptor
