    load the related data with <xref href="nORM.Core.NavigationEntry.Load" data-throw-if-not-resolved="false"></xref> / <xref href="nORM.Core.NavigationEntry.LoadAsync(System.Threading.CancellationToken)" data-throw-if-not-resolved="false"></xref>, inspect or override

    whether it has been loaded via <xref href="nORM.Core.NavigationEntry.IsLoaded" data-throw-if-not-resolved="false"></xref>, and read/write the property through

    <xref href="nORM.Core.NavigationEntry.CurrentValue" data-throw-if-not-resolved="false"></xref>.
