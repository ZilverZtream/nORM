  summary: >-
    Represents a single navigation property of a tracked entity, exposed by

    <xref href="nORM.Core.EntityEntry.Reference(System.String)" data-throw-if-not-resolved="false"></xref>, <xref href="nORM.Core.EntityEntry.Collection(System.String)" data-throw-if-not-resolved="false"></xref>, and

