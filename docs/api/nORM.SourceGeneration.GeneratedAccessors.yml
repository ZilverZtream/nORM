  assemblies:
  - nORM
  namespace: nORM.SourceGeneration
  summary: >-
    Registers source-generated getters and setters for <code class="paramref">entityType</code>. Called from the

    generated <code>[ModuleInitializer]</code>. Idempotent: the first registration for a type wins, so a

    duplicate module initializer (e.g. the same entity referenced by multiple assemblies) is a no-op.
  example: []
  syntax:
    content: public static void Register(Type entityType, IReadOnlyDictionary<string, Func<object, object?>> getters, IReadOnlyDictionary<string, Action<object, object?>> setters)
    parameters:
    - id: entityType
      type: System.Type
      description: The entity CLR type the accessors belong to.
    - id: getters
      type: System.Collections.Generic.IReadOnlyDictionary{System.String,System.Func{System.Object,System.Object}}
      description: Property-name → boxed-value getter map.
    - id: setters
      type: System.Collections.Generic.IReadOnlyDictionary{System.String,System.Action{System.Object,System.Object}}
      description: Property-name → boxed-value setter map.
    content.vb: Public Shared Sub Register(entityType As Type, getters As IReadOnlyDictionary(Of String, Func(Of Object, Object)), setters As IReadOnlyDictionary(Of String, Action(Of Object, Object)))
