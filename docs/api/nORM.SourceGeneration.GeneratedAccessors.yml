    startLine: 28
  assemblies:
  - nORM
  namespace: nORM.SourceGeneration
  summary: >-
    Registry of source-generated property accessors (getters and setters) for

    <code>[GenerateMaterializer]</code> entities. Populated at module-initialization time by the

    source generator with direct-access lambdas — <code>o =&gt; ((TEntity)o).Prop</code> and

    <code>(o, v) =&gt; ((TEntity)o).Prop = (TProp)v</code> — that statically reference each property.
  remarks: >-
    <p>

    The write path reads and writes entity values through <xref href="System.Reflection" data-throw-if-not-resolved="false"></xref>-built

    delegates (see <code>ColumnMappingCache.CreateOptimizedGetter/CreateOptimizedSetter</code>). Under a

    trimmed or NativeAOT publish, nothing else statically references those property accessors, so the

    trimmer removes them and the reflection delegates silently return defaults — corrupting writes.

    The generated lambdas registered here keep a static reference to every property accessor, so the

    trimmer preserves them and the write path is correct with no consumer <code>&lt;TrimmerRootAssembly&gt;</code>

    ceremony.

    </p>

    <p>

    This type is public because the source generator emits <code>GeneratedAccessors.Register(...)</code> into

    consumer assemblies, exactly like <xref href="nORM.SourceGeneration.CompiledMaterializerStore" data-throw-if-not-resolved="false"></xref>. It performs no reflection

    and no dynamic code; every delegate it holds was produced by the compiler.

    </p>
  example: []
  syntax:
    content: public static class GeneratedAccessors
    content.vb: Public Module GeneratedAccessors
