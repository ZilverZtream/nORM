  assemblies:
  - nORM
  namespace: nORM.SourceGeneration
  summary: >-
    Attempts to retrieve a source-generated getter for <code class="paramref">propertyName</code> on

    <code class="paramref">entityType</code>. Returns <code>false</code> when the type has no generated accessors

    (not a <code>[GenerateMaterializer]</code> entity) or the property was not source-generated (e.g. an

    owned/nested property), so the caller falls back to the reflection getter.
  example: []
  syntax:
    content: public static bool TryGetGetter(Type entityType, string propertyName, out Func<object, object?>? getter)
    parameters:
    - id: entityType
      type: System.Type
    - id: propertyName
      type: System.String
    - id: getter
      type: System.Func{System.Object,System.Object}
      attributes:
      - type: System.Diagnostics.CodeAnalysis.NotNullWhenAttribute
        ctor: System.Diagnostics.CodeAnalysis.NotNullWhenAttribute.#ctor(System.Boolean)
        arguments:
        - type: System.Boolean
          value: true
    return:
      type: System.Boolean
    content.vb: Public Shared Function TryGetGetter(entityType As Type, propertyName As String, getter As Func(Of Object, Object)) As Boolean
