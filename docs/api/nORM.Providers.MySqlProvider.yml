  assemblies:
  - nORM
  namespace: nORM.Providers
  summary: >-
    Escapes an identifier using MySQL backtick delimiters.

    Handles multi-part identifiers (schema.table) by escaping each segment separately so

    that <code>`schema`.`table`</code> is produced rather than the invalid <code>`schema.table`</code>.

    Embedded backtick characters are doubled to prevent SQL injection via identifiers.
  example: []
  syntax:
    content: public override string Escape(string id)
    parameters:
    - id: id
      type: System.String
      description: The identifier to escape.
    return:
      type: System.String
      description: The escaped identifier.
    content.vb: Public Overrides Function Escape(id As String) As String
