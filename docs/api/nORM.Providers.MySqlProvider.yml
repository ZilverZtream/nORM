  assemblies:
  - nORM
  namespace: nORM.Providers
  summary: Initializes a new instance of the <xref href="nORM.Providers.MySqlProvider" data-throw-if-not-resolved="false"></xref> class.
  remarks: >-
    <p>

    <b>Runtime dependency:</b> This provider uses MySQL via reflection and requires either

    <code>MySqlConnector</code> or <code>MySql.Data</code> to be installed in the consuming application.

    Add one of the following to your project:


    <pre><code class="lang-csharp">dotnet add package MySqlConnector</code></pre>


    or


    <pre><code class="lang-csharp">dotnet add package MySql.Data</code></pre>


    A clear <xref href="System.InvalidOperationException" data-throw-if-not-resolved="false"></xref> is thrown at runtime if neither package is present.

    </p>
