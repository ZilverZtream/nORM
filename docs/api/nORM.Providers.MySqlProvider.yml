  assemblies:
  - nORM
  namespace: nORM.Providers
  summary: Initializes a new instance of the <xref href="nORM.Providers.MySqlProvider" data-throw-if-not-resolved="false"></xref> class.
  remarks: >-
    When this value is <a href="https://learn.microsoft.com/dotnet/csharp/language-reference/builtin-types/bool">false</a>, nORM treats zero-row UPDATE results as strict

    optimistic-concurrency conflicts. The database connection must be configured consistently;

    setting this to <a href="https://learn.microsoft.com/dotnet/csharp/language-reference/builtin-types/bool">false</a> while the driver still uses affected-row semantics

    can produce false-positive conflicts for same-value updates.
  example: []
  syntax:
    content: public MySqlProvider(IDbParameterFactory parameterFactory, bool useAffectedRowsSemantics)
    parameters:
    - id: parameterFactory
      type: nORM.Providers.IDbParameterFactory
      description: Factory used to create provider-specific parameters.
    - id: useAffectedRowsSemantics
      type: System.Boolean
      description: >-
        <a href="https://learn.microsoft.com/dotnet/csharp/language-reference/builtin-types/bool">true</a> when the MySQL driver reports changed rows for UPDATE statements.

        Use <a href="https://learn.microsoft.com/dotnet/csharp/language-reference/builtin-types/bool">false</a> only when the connection string is configured for matched-row

        semantics, for example <code>UseAffectedRows=false</code> with MySqlConnector.
    content.vb: Public Sub New(parameterFactory As IDbParameterFactory, useAffectedRowsSemantics As Boolean)
  overload: nORM.Providers.MySqlProvider.#ctor*
