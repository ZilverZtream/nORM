  assemblies:
  - nORM
  namespace: nORM.Migration
  summary: Represents the differences between two <xref href="nORM.Migration.SchemaSnapshot" data-throw-if-not-resolved="false"></xref> instances.
  remarks: >-
    All list properties on this class are initialized to non-null empty lists and must

    remain non-null throughout their lifetime. Individual entries within each list must

    also be non-null; adding a null entry will cause downstream migration SQL generators

    to throw a <xref href="System.NullReferenceException" data-throw-if-not-resolved="false"></xref>. The lists themselves must never be

    set to null - <xref href="nORM.Migration.SchemaDiff.HasChanges" data-throw-if-not-resolved="false"></xref> and all four SQL generators assume non-null lists.
