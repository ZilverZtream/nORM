  namespace: nORM.Configuration
  summary: >-
    Configures a single entity type's mapping in a dedicated class — the Entity Framework Core pattern.

    Implement this interface, then apply it with

    <xref href="nORM.Configuration.ModelBuilder.ApplyConfiguration%60%601(nORM.Configuration.IEntityTypeConfiguration%7b%60%600%7d)" data-throw-if-not-resolved="false"></xref> or

    <xref href="nORM.Configuration.ModelBuilder.ApplyConfigurationsFromAssembly(System.Reflection.Assembly)" data-throw-if-not-resolved="false"></xref>. This keeps

    per-entity fluent configuration out of one large <code>OnModelCreating</code> override.
  example: []
  syntax:
    content: 'public interface IEntityTypeConfiguration<TEntity> where TEntity : class'
    typeParameters:
    - id: TEntity
      description: The entity type this configuration applies to.
    content.vb: Public Interface IEntityTypeConfiguration(Of TEntity As Class)
