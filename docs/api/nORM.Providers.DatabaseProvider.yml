  namespace: nORM.Providers
  summary: Executes a single batch insert for the supplied entities.
  example: []
  syntax:
    content: 'protected Task<int> ExecuteInsertBatch<T>(DbContext ctx, TableMapping m, List<T> batch, CancellationToken ct, DbTransaction? transaction = null) where T : class'
    parameters:
    - id: ctx
      type: nORM.Core.DbContext
      description: Active <xref href="nORM.Core.DbContext" data-throw-if-not-resolved="false"></xref> providing the database connection.
    - id: m
      type: nORM.Mapping.TableMapping
      description: Table mapping used to generate the insert statement.
    - id: batch
      type: System.Collections.Generic.List{{T}}
      description: Entities to insert in a single round-trip.
    - id: ct
      type: System.Threading.CancellationToken
      description: Token used to cancel the asynchronous operation.
    - id: transaction
      type: System.Data.Common.DbTransaction
      description: Transaction that should contain the batch, or <code>null</code> to use the context's active transaction.
    typeParameters:
    - id: T
      description: Type of entity being inserted.
    return:
      type: System.Threading.Tasks.Task{System.Int32}
      description: The number of rows affected by the batch.
