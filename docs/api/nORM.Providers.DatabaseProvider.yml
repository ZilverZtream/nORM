  summary: >-
    Builds SQL for <code>new DateTimeOffset(year, month, day, hour, minute, second, offset)</code>

    when at least one of the date/time parts is a column expression and the

    <code class="paramref">offset</code> is a compile-time constant. Producing canonical

    ISO-8601 text (<code>yyyy-MM-ddTHH:mm:ss+/-HH:MM</code>) lets the materialiser

    route through <code>DateTimeOffset.Parse</code> uniformly across providers.


    Default implementation uses CASE-based zero-padding so it works on every

    SQL dialect; providers can override with a native faster path when one

    exists (e.g. SqlServer's DATETIMEOFFSETFROMPARTS).
