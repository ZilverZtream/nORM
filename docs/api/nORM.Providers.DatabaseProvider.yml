    Concatenation with C# <xref href="System.String.Concat(System.String%2cSystem.String)" data-throw-if-not-resolved="false"></xref> null semantics:

    a NULL operand contributes an empty string instead of nulling the whole result

    (<code>null + "!"</code> is <code>"!"</code> in C#, never null). The ANSI CONCAT default

    already ignores NULLs on SQL Server and PostgreSQL; providers whose concatenation

