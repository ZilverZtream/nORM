  assemblies:
  - nORM
  namespace: nORM.Providers
  summary: >-
    Returns SQL evaluating `end - start` (both TimeOnly) as fractional seconds

    wrapped to the half-open interval [0, 86400). Matches .NET's

    <code>TimeOnly.op_Subtraction</code>, which adds 24h to the raw difference when

    the result would be negative (so 01:00 - 23:00 yields +02:00, not -22:00).

    The materializer converts the REAL seconds back to <xref href="System.TimeSpan" data-throw-if-not-resolved="false"></xref>

    via <code>TimeSpan.FromSeconds</code> -- same path used by DateTime subtraction.

    Default throws so each provider must opt in.
