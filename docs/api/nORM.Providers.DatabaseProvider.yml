  assemblies:
  - nORM
  namespace: nORM.Providers
  summary: >-
    Wraps a SQL operand (a DateTimeOffset column/expression) so ORDER BY / DISTINCT / GROUP BY

    sort by the UTC instant, matching <xref href="System.DateTimeOffset" data-throw-if-not-resolved="false"></xref>'s instant-based comparison

    in LINQ. SQL Server (native <code>datetimeoffset</code>), PostgreSQL (<code>timestamptz</code>) and

    MySQL (nORM stores a <code>DATETIME(6)</code> pre-normalised to UTC) already order by instant,

    so the default is identity — which also keeps any index on the column usable. SQLite

    stores DateTimeOffset as offset-suffixed TEXT, whose lexical order is NOT instant order

