    id: Schemas
    path: src/nORM/Scaffolding/ScaffoldOptions.cs
    startLine: 30
  assemblies:
  - nORM
  namespace: nORM.Scaffolding
  summary: >-
    Gets the optional schema filter. When empty, all discovered schemas are

    included unless <xref href="nORM.Scaffolding.ScaffoldOptions.Tables" data-throw-if-not-resolved="false"></xref> narrows the scaffold. When set,

    all discovered user tables and supported query artifacts in the

    listed schemas are scaffolded. Schema filters are unioned with

    explicit table filters. Null or blank schema entries are treated as

    empty.
  example: []
  syntax:
    content: public IReadOnlyCollection<string> Schemas { get; init; }
    parameters: []
    return:
      type: System.Collections.Generic.IReadOnlyCollection{System.String}
