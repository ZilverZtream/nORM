    path: src/nORM/Scaffolding/ScaffoldOptions.cs
    startLine: 20
  assemblies:
  - nORM
  namespace: nORM.Scaffolding
  summary: >-
    Gets the optional table filter. Entries may be bare table names or

    schema-qualified names such as <code>dbo.Customer</code>. Matching

    supported query artifacts such as views are emitted as read-only

    entities. When empty, all discovered user tables and ordinary

    views/materialized views are scaffolded; provider-specific virtual

    tables and synonyms remain opt-in query artifacts. Null or blank

    filters are treated as empty.
  example: []
  syntax:
    content: public IReadOnlyCollection<string> Tables { get; init; }
    parameters: []
    return:
      type: System.Collections.Generic.IReadOnlyCollection{System.String}
    content.vb: Public Property Tables As IReadOnlyCollection(Of String)
  overload: nORM.Scaffolding.ScaffoldOptions.Tables*
