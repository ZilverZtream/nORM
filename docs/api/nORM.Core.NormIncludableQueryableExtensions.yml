  assemblies:
  - nORM
  namespace: nORM.Core
  summary: >-
    Disables change tracking for the query results, matching Entity Framework Core's

    <code>AsNoTracking</code>. Like <xref href="nORM.Core.NormIncludableQueryableExtensions.Include%60%602(System.Linq.IQueryable%7b%60%600%7d%2cSystem.Linq.Expressions.Expression%7bSystem.Func%7b%60%600%2c%60%601%7d%7d)" data-throw-if-not-resolved="false"></xref> this extension lets

    <code>AsNoTracking</code> chain off the <xref href="System.Linq.IQueryable%601" data-throw-if-not-resolved="false"></xref> returned by

    <xref href="nORM.Core.NormQueryable.Query%60%601(nORM.Core.DbContext)" data-throw-if-not-resolved="false"></xref>/<xref href="nORM.Core.NormQueryable.Set%60%601(nORM.Core.DbContext)" data-throw-if-not-resolved="false"></xref> and off standard

    operators without a cast to <xref href="nORM.Core.INormQueryable%601" data-throw-if-not-resolved="false"></xref>; when the static type already

    is <xref href="nORM.Core.INormQueryable%601" data-throw-if-not-resolved="false"></xref> the instance method is preferred by the compiler.
  example: []
  syntax:
    content: 'public static INormQueryable<T> AsNoTracking<T>(this IQueryable<T> source) where T : class'
    parameters:
    - id: source
      type: System.Linq.IQueryable{{T}}
      description: A nORM query started with <code>context.Query&lt;T&gt;()</code>/<code>Set&lt;T&gt;()</code>.
    typeParameters:
    - id: T
      description: The entity type of the query.
    return:
      type: nORM.Core.INormQueryable{{T}}
      description: An untracked query.
    content.vb: Public Shared Function AsNoTracking(Of T As Class)(source As IQueryable(Of T)) As INormQueryable(Of T)
