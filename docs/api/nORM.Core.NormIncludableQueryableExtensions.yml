  assemblies:
  - nORM
  namespace: nORM.Core
  summary: >-
    Adds a comment tag to the generated SQL for this query, matching EF Core's <code>TagWith</code>. The

    tag is emitted as a leading SQL line comment (injection-safe: each line is prefixed with

    <code>-- </code>), which is invaluable for correlating a query in database logs, an APM trace, or a

    slow-query report back to the source. Multiple <code>TagWith</code> calls accumulate. Has no effect on

    results.
  example: []
  syntax:
    content: >-
      [RequiresDynamicCode("nORM TagWith emits a MakeGenericMethod marker call; not NativeAOT-compatible.")]

      [RequiresUnreferencedCode("nORM TagWith uses reflection to resolve the open generic marker method; trimming may remove it.")]

