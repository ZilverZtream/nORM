  assemblies:
  - nORM
  namespace: nORM.Core
  summary: >-
    Forces the query's results to be change-tracked, matching Entity Framework Core's

    <code>AsTracking</code>. This is the per-query override of a context whose

    <xref href="nORM.Configuration.DbContextOptions.DefaultTrackingBehavior" data-throw-if-not-resolved="false"></xref> is

    <xref href="nORM.Core.QueryTrackingBehavior.NoTracking" data-throw-if-not-resolved="false"></xref> — the results are tracked even though the context

    would otherwise return them detached. When composed with <code>AsNoTracking</code> the outermost

    (last-written) call wins. Has no effect on the default (already tracking) context.
  example: []
  syntax:
    content: >-
      [RequiresDynamicCode("nORM AsTracking emits a MakeGenericMethod marker call; not NativeAOT-compatible.")]

      [RequiresUnreferencedCode("nORM AsTracking uses reflection to resolve the open generic marker method; trimming may remove it.")]

      public static IQueryable<T> AsTracking<T>(this IQueryable<T> source) where T : class
    parameters:
    - id: source
      type: System.Linq.IQueryable{{T}}
      description: A nORM query started with <code>context.Query&lt;T&gt;()</code>/<code>Set&lt;T&gt;()</code>.
    typeParameters:
    - id: T
      description: The entity type of the query.
    return:
      type: System.Linq.IQueryable{{T}}
      description: A query whose results are tracked.
    content.vb: >-
      <RequiresDynamicCode("nORM AsTracking emits a MakeGenericMethod marker call; not NativeAOT-compatible.")>

      <RequiresUnreferencedCode("nORM AsTracking uses reflection to resolve the open generic marker method; trimming may remove it.")>

