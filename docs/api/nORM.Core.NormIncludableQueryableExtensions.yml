  assemblies:
  - nORM
  namespace: nORM.Core
  summary: >-
    Specifies a navigation property to eager-load, matching Entity Framework Core's

    <code>Include</code> surface. This extension lets <code>Include</code> chain directly off the

    <xref href="System.Linq.IQueryable%601" data-throw-if-not-resolved="false"></xref> returned by <xref href="nORM.Core.NormQueryable.Query%60%601(nORM.Core.DbContext)" data-throw-if-not-resolved="false"></xref> /

    <xref href="nORM.Core.NormQueryable.Set%60%601(nORM.Core.DbContext)" data-throw-if-not-resolved="false"></xref> and off standard operators such as

    <code>Where</code>/<code>OrderBy</code>, whose static result type is <xref href="System.Linq.IQueryable%601" data-throw-if-not-resolved="false"></xref>

    even though the underlying object is a nORM queryable — so no cast to

    <xref href="nORM.Core.INormQueryable%601" data-throw-if-not-resolved="false"></xref> is required. When the static type already is

    <xref href="nORM.Core.INormQueryable%601" data-throw-if-not-resolved="false"></xref>, the instance <code>Include</code> is preferred by the

    compiler and this extension is not involved.
  example: []
  syntax:
    content: 'public static INormIncludableQueryable<TEntity, TProperty> Include<TEntity, TProperty>(this IQueryable<TEntity> source, Expression<Func<TEntity, TProperty>> navigationPropertyPath) where TEntity : class'
    parameters:
    - id: source
      type: System.Linq.IQueryable{{TEntity}}
      description: A nORM query started with <code>context.Query&lt;T&gt;()</code>/<code>Set&lt;T&gt;()</code>.
    - id: navigationPropertyPath
      type: System.Linq.Expressions.Expression{System.Func{{TEntity},{TProperty}}}
      description: Expression identifying the navigation to include.
    typeParameters:
    - id: TEntity
      description: The root entity type of the query.
    - id: TProperty
      description: Type of the navigation property.
    return:
      type: nORM.Core.INormIncludableQueryable{{TEntity},{TProperty}}
      description: A query with the navigation included, chainable with <code>ThenInclude</code>.
    content.vb: Public Shared Function Include(Of TEntity As Class, TProperty)(source As IQueryable(Of TEntity), navigationPropertyPath As Expression(Of Func(Of TEntity, TProperty))) As INormIncludableQueryable(Of TEntity, TProperty)
