    path: src/nORM/Providers/SqliteProvider.cs
    startLine: 29
  assemblies:
  - nORM
  namespace: nORM.Providers
  summary: >-
    SQLite has no true async I/O — all async methods are synchronous wrappers.

    Using sync calls eliminates ~50-100ns of async state machine overhead per Read().
  example: []
  syntax:
    content: public override bool PrefersSyncExecution { get; }
    parameters: []
    return:
      type: System.Boolean
