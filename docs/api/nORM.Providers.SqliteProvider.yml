    id: Escape
    path: src/nORM/Providers/SqliteProvider.cs
    startLine: 94
  assemblies:
  - nORM
  namespace: nORM.Providers
  summary: >-
    Escapes an identifier by wrapping it in double quotes, per SQLite requirements.

    Handles multi-part identifiers (schema.table / attached-db.table) by escaping each

    segment separately so that <code>"schema"."table"</code> is produced rather than the invalid

    <code>"schema.table"</code>.

    Embedded double-quote characters are doubled to prevent SQL injection via identifiers.
  example: []
  syntax:
    content: public override string Escape(string id)
    parameters:
    - id: id
      type: System.String
      description: Identifier to escape (e.g., <code>"table"</code> or <code>"schema.table"</code>).
    return:
      type: System.String
      description: The escaped identifier.
    content.vb: Public Overrides Function Escape(id As String) As String
