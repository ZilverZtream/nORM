  assemblies:
  - nORM
  namespace: nORM.Providers
  summary: >-
    SQLite's <code>IS</code> operator provides null-safe equality with index support.

    <code>col IS @p</code> is equivalent to <code>col = @p OR (col IS NULL AND @p IS NULL)</code>

    but allows the query planner to use column indexes efficiently.
  example: []
  syntax:
    content: public override string NullSafeEqual(string left, string right)
    parameters:
    - id: left
      type: System.String
    - id: right
      type: System.String
