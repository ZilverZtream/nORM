  assemblies:
  - nORM
  namespace: nORM.Core
  summary: >-
    Creates <code class="typeparamref">TContext</code> instances on demand, independent of any

    dependency-injection scope. Register it with

    <code>IServiceCollection.AddNormFactory&lt;TContext&gt;(...)</code> and inject it into

    singletons, background services, or components that need to control a context's

    lifetime explicitly - for example one short-lived context per unit of work.
  remarks: >-
    Unlike a scope-resolved <xref href="nORM.Core.DbContext" data-throw-if-not-resolved="false"></xref>, contexts returned by

    <xref href="nORM.Core.INormDbContextFactory%601.CreateDbContext" data-throw-if-not-resolved="false"></xref> are owned by the caller and must be disposed by the

    caller (ideally with <code>await using</code>).
  example: []
  syntax:
    content: 'public interface INormDbContextFactory<out TContext> where TContext : DbContext'
    typeParameters:
    - id: TContext
      description: The context type produced by the factory.
    content.vb: Public Interface INormDbContextFactory(Of Out TContext As DbContext)
