- uid: nORM.Migration.SchemaSnapshotBuilder.Build(System.Reflection.Assembly)
  commentId: M:nORM.Migration.SchemaSnapshotBuilder.Build(System.Reflection.Assembly)
  id: Build(System.Reflection.Assembly)
  parent: nORM.Migration.SchemaSnapshotBuilder
  langs:
  - csharp
  - vb
  name: Build(Assembly)
  nameWithType: SchemaSnapshotBuilder.Build(Assembly)
  fullName: nORM.Migration.SchemaSnapshotBuilder.Build(System.Reflection.Assembly)
  type: Method
  source:
    remote:
      path: src/nORM/Migration/SchemaSnapshot.Builder.cs
      branch: main
      repo: https://github.com/ZilverZtream/nORM.git
    id: Build
    path: src/nORM/Migration/SchemaSnapshot.Builder.cs
    startLine: 48
  assemblies:
  - nORM
  namespace: nORM.Migration
  summary: >-
    Builds a snapshot of the entity schema by inspecting the types in the provided assembly.

    Reflects only attributes and conventions; fluent configuration is not visible.

    Use <xref href="nORM.Migration.SchemaSnapshotBuilder.Build(nORM.Core.DbContext)" data-throw-if-not-resolved="false"></xref> to include fluent model overrides.
  remarks: >-
    <p>

    <b>Differences from <xref href="nORM.Migration.SchemaSnapshotBuilder.Build(nORM.Core.DbContext)" data-throw-if-not-resolved="false"></xref>:</b>

    </p>

    <ul><li>Uses reflection, <code>[Table]</code>/<code>[Column]</code>/<code>[Key]</code>/<code>[DatabaseGenerated]</code>
            attributes, and Id/TypeNameId conventions to discover entities and their columns.
            Fluent API overrides (e.g. <code>ToTable()</code>, <code>HasColumnName()</code>, <code>HasKey()</code>)
            are <b>not</b> visible here.</li><li>Scans all non-abstract classes in the assembly that carry <code>[Table]</code> or a
            <code>[Key]</code>-annotated property. The context-based overload only includes types
            explicitly registered with the fluent model builder.</li><li>Does not include foreign key constraints (no fluent Relation metadata available).</li><li>Cannot see <xref href="nORM.Configuration.DbContextOptions" data-throw-if-not-resolved="false"></xref>, so <xref href="nORM.Migration.TableSchema.IsTemporal" data-throw-if-not-resolved="false"></xref>
            is never set - temporal-aware migration DDL requires the context overload.</li><li>May produce duplicate <code>TableSchema</code> entries if two entity types share the
            same <code>[Table]</code> name - see the duplicate-name guard for details.</li></ul>
  example: []
  syntax:
    content: public static SchemaSnapshot Build(Assembly assembly)
    parameters:
    - id: assembly
      type: System.Reflection.Assembly
      description: The assembly containing the entity types to scan.
    return:
      type: nORM.Migration.SchemaSnapshot
      description: A snapshot describing the tables and columns inferred from the assembly.
    content.vb: Public Shared Function Build(assembly As Assembly) As SchemaSnapshot
  overload: nORM.Migration.SchemaSnapshotBuilder.Build*
- uid: nORM.Migration.SchemaSnapshotBuilder.Build(nORM.Core.DbContext)
  commentId: M:nORM.Migration.SchemaSnapshotBuilder.Build(nORM.Core.DbContext)
  id: Build(nORM.Core.DbContext)
  parent: nORM.Migration.SchemaSnapshotBuilder
  langs:
  - csharp
  - vb
  name: Build(DbContext)
  nameWithType: SchemaSnapshotBuilder.Build(DbContext)
  fullName: nORM.Migration.SchemaSnapshotBuilder.Build(nORM.Core.DbContext)
  type: Method
  source:
    remote:
      path: src/nORM/Migration/SchemaSnapshot.Builder.cs
      branch: main
      repo: https://github.com/ZilverZtream/nORM.git
    id: Build
    path: src/nORM/Migration/SchemaSnapshot.Builder.cs
    startLine: 252
  assemblies:
  - nORM
  namespace: nORM.Migration
  summary: >-
    Builds a snapshot using only the fluent-registered entity types from the provided

    <xref href="nORM.Core.DbContext" data-throw-if-not-resolved="false"></xref>. Unlike <xref href="nORM.Migration.SchemaSnapshotBuilder.Build(System.Reflection.Assembly)" data-throw-if-not-resolved="false"></xref>, this method does NOT

    scan the context's assembly; it operates exclusively on types that have been

    explicitly configured via the fluent API (e.g. <code>modelBuilder.Entity&lt;T&gt;()</code>).

    Fluent overrides such as <code>ToTable()</code>, <code>HasColumnName()</code>, and <code>HasKey()</code>

    are reflected in the returned snapshot.
  remarks: >-
    <p>

    <b>Differences from <xref href="nORM.Migration.SchemaSnapshotBuilder.Build(System.Reflection.Assembly)" data-throw-if-not-resolved="false"></xref>:</b>

    </p>

    <ul><li>Uses the resolved <xref href="nORM.Mapping.TableMapping" data-throw-if-not-resolved="false"></xref> objects produced by the fluent model
            builder. Fluent overrides (<code>ToTable()</code>, <code>HasColumnName()</code>, <code>HasKey()</code>,
            <code>HasForeignKey()</code>, etc.) are fully reflected.</li><li>Only includes entity types explicitly registered via
            <code>modelBuilder.Entity&lt;T&gt;()</code>. Types present in the assembly but not
            registered are silently excluded, preventing StackOverflowExceptions from
            circular navigation properties in test assemblies.</li><li>Includes foreign key constraints derived from fluent <code>HasForeignKey()</code>
            / <code>HasOne()</code> / <code>HasMany()</code> configuration.</li><li>Includes inline owned scalar columns, shadow columns, and metadata from <code>OwnsOne()</code>,
            owned collection child tables from <code>OwnsMany()</code>, and configured
            many-to-many join tables.</li></ul>
  example: []
  syntax:
    content: public static SchemaSnapshot Build(DbContext ctx)
    parameters:
    - id: ctx
      type: nORM.Core.DbContext
      description: The context whose fluent model is used to build the snapshot.
    return:
      type: nORM.Migration.SchemaSnapshot
      description: A snapshot reflecting the fluent runtime model of the context.
    content.vb: Public Shared Function Build(ctx As DbContext) As SchemaSnapshot
  overload: nORM.Migration.SchemaSnapshotBuilder.Build*
