  assemblies:
  - nORM
  namespace: nORM.Core
  summary: >-
    Copies every mapped property value from <code class="paramref">source</code> into this bag. The source may be

    another <xref href="nORM.Core.PropertyValues" data-throw-if-not-resolved="false"></xref> (e.g. copy database values onto the tracked entity while

    resolving a conflict) or an instance of the mapped entity type.
