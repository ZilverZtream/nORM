  assemblies:
  - nORM
  namespace: nORM.Core
  summary: >-
    A mutable bag of an entity's property values, exposed by <xref href="nORM.Core.EntityEntry.CurrentValues" data-throw-if-not-resolved="false"></xref>

    (the live entity) and <xref href="nORM.Core.EntityEntry.OriginalValues" data-throw-if-not-resolved="false"></xref> (the as-loaded baseline). It mirrors

    EF Core's <code>PropertyValues</code>: index by property name to read or write a value, copy a whole set of

    values with <xref href="nORM.Core.PropertyValues.SetValues(System.Object)" data-throw-if-not-resolved="false"></xref>, or clone them into a detached instance with

    <xref href="nORM.Core.PropertyValues.ToObject" data-throw-if-not-resolved="false"></xref>. Writing to <xref href="nORM.Core.EntityEntry.CurrentValues" data-throw-if-not-resolved="false"></xref> updates the entity and

    marks it modified; writing to <xref href="nORM.Core.EntityEntry.OriginalValues" data-throw-if-not-resolved="false"></xref> overrides the tracked baseline

    (e.g. a concurrency token) without touching the entity.
