  assemblies:
  - nORM
  namespace: Microsoft.Extensions.DependencyInjection
  summary: >-
    Registers <code class="typeparamref">TContext</code> as a POOLED scoped service — the Entity Framework Core

    <code>AddDbContextPool</code> analogue. A bounded pool of warm contexts is reused across DI scopes,

    avoiding the per-context reflection, prepared-command and fast-path SQL cache warm-up on every

    request (the dominant cost of the ASP.NET new-context-per-request pattern). When a scope ends the

    context is reset — change tracker and identity map cleared, native tenant session key cleared so

    the next lease re-applies its own tenant — and returned to the pool; a context holding a live

    transaction is disposed rather than pooled. The factory runs against the ROOT service provider, so

    pooled contexts (and their connections, pooled as a unit) must not depend on scoped services.
  example: []
  syntax:
    content: 'public static IServiceCollection AddNormPool<TContext>(this IServiceCollection services, Func<IServiceProvider, TContext> contextFactory, int poolSize = 1024) where TContext : DbContext'
    parameters:
    - id: services
      type: Microsoft.Extensions.DependencyInjection.IServiceCollection
      description: The service collection to add the registration to.
    - id: contextFactory
      type: System.Func{System.IServiceProvider,{TContext}}
      description: Factory that builds a context from the root service provider.
    - id: poolSize
      type: System.Int32
      description: Maximum number of contexts retained in the pool. Defaults to 1024.
    typeParameters:
    - id: TContext
    return:
      type: Microsoft.Extensions.DependencyInjection.IServiceCollection
      description: The same <code class="paramref">services</code> instance for chaining.
    content.vb: Public Shared Function AddNormPool(Of TContext As DbContext)(services As IServiceCollection, contextFactory As Func(Of IServiceProvider, TContext), poolSize As Integer = 1024) As IServiceCollection
  overload: Microsoft.Extensions.DependencyInjection.NormServiceCollectionExtensions.AddNormPool*
  exceptions:
  - type: System.ArgumentNullException
    commentId: T:System.ArgumentNullException
    description: Thrown when <code class="paramref">services</code> or <code class="paramref">contextFactory</code> is null.
  - type: System.ArgumentOutOfRangeException
    commentId: T:System.ArgumentOutOfRangeException
    description: Thrown when <code class="paramref">poolSize</code> is not positive.
  nameWithType.vb: NormServiceCollectionExtensions.AddNormPool(Of TContext)(IServiceCollection, Func(Of IServiceProvider, TContext), Integer)
  fullName.vb: Microsoft.Extensions.DependencyInjection.NormServiceCollectionExtensions.AddNormPool(Of TContext)(Microsoft.Extensions.DependencyInjection.IServiceCollection, System.Func(Of System.IServiceProvider, TContext), Integer)
