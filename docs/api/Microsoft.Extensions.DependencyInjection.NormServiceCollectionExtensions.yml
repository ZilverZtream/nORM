  assemblies:
  - nORM
  namespace: Microsoft.Extensions.DependencyInjection
  summary: >-
    Registers a <xref href="nORM.Core.DbContext" data-throw-if-not-resolved="false"></xref> built from a connection string and a provider

    factory. A fresh <xref href="nORM.Configuration.DbContextOptions" data-throw-if-not-resolved="false"></xref> is created and configured for each

    context, so no configuration state is shared between instances. The default

    <xref href="Microsoft.Extensions.DependencyInjection.ServiceLifetime.Scoped" data-throw-if-not-resolved="false"></xref> lifetime yields one context - and one

    connection - per DI scope, which the container disposes when the scope ends.
  example: []
  syntax:
    content: >-
      [RequiresUnreferencedCode("nORM builds entity mappings and materializers by reflecting over entity types; trimming may remove required members. See docs/aot-trimming.md.")]

      [RequiresDynamicCode("nORM uses Expression-based query translation and reflection-emit materializers and is not NativeAOT-compatible. See docs/aot-trimming.md.")]

      public static IServiceCollection AddNorm(this IServiceCollection services, string connectionString, Func<DatabaseProvider> providerFactory, Action<DbContextOptions>? configureOptions = null, ServiceLifetime lifetime = ServiceLifetime.Scoped)
    parameters:
    - id: services
      type: Microsoft.Extensions.DependencyInjection.IServiceCollection
      description: The service collection to add the registration to.
    - id: connectionString
      type: System.String
      description: The provider connection string.
    - id: providerFactory
      type: System.Func{nORM.Providers.DatabaseProvider}
      description: >-
        Factory that returns the <xref href="nORM.Providers.DatabaseProvider" data-throw-if-not-resolved="false"></xref> for each context. A new

        provider is requested per created context.
    - id: configureOptions
      type: System.Action{nORM.Configuration.DbContextOptions}
      description: Optional callback to configure per-context options.
    - id: lifetime
      type: Microsoft.Extensions.DependencyInjection.ServiceLifetime
      description: >-
        The <xref href="nORM.Core.DbContext" data-throw-if-not-resolved="false"></xref> service lifetime. Defaults to

        <xref href="Microsoft.Extensions.DependencyInjection.ServiceLifetime.Scoped" data-throw-if-not-resolved="false"></xref>.
    return:
      type: Microsoft.Extensions.DependencyInjection.IServiceCollection
      description: The same <code class="paramref">services</code> instance for chaining.
    content.vb: >-
      <RequiresUnreferencedCode("nORM builds entity mappings and materializers by reflecting over entity types; trimming may remove required members. See docs/aot-trimming.md.")>

      <RequiresDynamicCode("nORM uses Expression-based query translation and reflection-emit materializers and is not NativeAOT-compatible. See docs/aot-trimming.md.")>

      Public Shared Function AddNorm(services As IServiceCollection, connectionString As String, providerFactory As Func(Of DatabaseProvider), configureOptions As Action(Of DbContextOptions) = Nothing, lifetime As ServiceLifetime = ServiceLifetime.Scoped) As IServiceCollection
