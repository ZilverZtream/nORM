  assemblies:
  - nORM
  namespace: Microsoft.Extensions.DependencyInjection
  summary: >-
    Registers a custom <code class="typeparamref">TContext</code> produced by an explicit factory,

    which may resolve additional services from the <xref href="System.IServiceProvider" data-throw-if-not-resolved="false"></xref>. The

    default <xref href="Microsoft.Extensions.DependencyInjection.ServiceLifetime.Scoped" data-throw-if-not-resolved="false"></xref> lifetime yields one context per DI

    scope, disposed by the container at scope end. Inject <code class="typeparamref">TContext</code>.
  example: []
  syntax:
    content: 'public static IServiceCollection AddNorm<TContext>(this IServiceCollection services, Func<IServiceProvider, TContext> contextFactory, ServiceLifetime lifetime = ServiceLifetime.Scoped) where TContext : DbContext'
    parameters:
    - id: services
      type: Microsoft.Extensions.DependencyInjection.IServiceCollection
      description: The service collection to add the registration to.
    - id: contextFactory
      type: System.Func{System.IServiceProvider,{TContext}}
      description: Factory that builds the context from the scope's services.
    - id: lifetime
      type: Microsoft.Extensions.DependencyInjection.ServiceLifetime
      description: The context service lifetime. Defaults to <xref href="Microsoft.Extensions.DependencyInjection.ServiceLifetime.Scoped" data-throw-if-not-resolved="false"></xref>.
    typeParameters:
    - id: TContext
    return:
      type: Microsoft.Extensions.DependencyInjection.IServiceCollection
      description: The same <code class="paramref">services</code> instance for chaining.
    content.vb: Public Shared Function AddNorm(Of TContext As DbContext)(services As IServiceCollection, contextFactory As Func(Of IServiceProvider, TContext), lifetime As ServiceLifetime = ServiceLifetime.Scoped) As IServiceCollection
  overload: Microsoft.Extensions.DependencyInjection.NormServiceCollectionExtensions.AddNorm*
  nameWithType.vb: NormServiceCollectionExtensions.AddNorm(Of TContext)(IServiceCollection, Func(Of IServiceProvider, TContext), ServiceLifetime)
