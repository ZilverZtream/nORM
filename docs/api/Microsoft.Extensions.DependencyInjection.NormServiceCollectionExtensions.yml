  namespace: Microsoft.Extensions.DependencyInjection
  summary: >-
    Registers nORM with an <xref href="Microsoft.Extensions.DependencyInjection.IServiceCollection" data-throw-if-not-resolved="false"></xref> so a

    <xref href="nORM.Core.DbContext" data-throw-if-not-resolved="false"></xref> participates in dependency injection with a

    container-managed lifetime, mirroring the ASP.NET Core hosting model

    (<code>builder.Services.AddNorm(...)</code>). The extension methods live in the

    <code>Microsoft.Extensions.DependencyInjection</code> namespace so they surface on

    <xref href="Microsoft.Extensions.DependencyInjection.IServiceCollection" data-throw-if-not-resolved="false"></xref> without an extra <code>using</code>, following the

    standard convention for <code>Microsoft.Extensions.*</code> integrations.
