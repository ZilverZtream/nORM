  namespace: Microsoft.Extensions.DependencyInjection
  summary: >-
    Registers an <xref href="nORM.Core.INormDbContextFactory%601" data-throw-if-not-resolved="false"></xref> singleton that produces

    caller-owned <code class="typeparamref">TContext</code> instances on demand. Use it for

    singletons, background services, or parallel work that must control context

    lifetime explicitly instead of relying on a DI scope. Contexts returned by the

    factory are owned - and must be disposed - by the caller.
  example: []
  syntax:
    content: 'public static IServiceCollection AddNormFactory<TContext>(this IServiceCollection services, Func<IServiceProvider, TContext> contextFactory) where TContext : DbContext'
    parameters:
    - id: services
      type: Microsoft.Extensions.DependencyInjection.IServiceCollection
      description: The service collection to add the registration to.
    - id: contextFactory
      type: System.Func{System.IServiceProvider,{TContext}}
      description: Factory that builds a context from the root <xref href="System.IServiceProvider" data-throw-if-not-resolved="false"></xref>.
    typeParameters:
    - id: TContext
    return:
      type: Microsoft.Extensions.DependencyInjection.IServiceCollection
      description: The same <code class="paramref">services</code> instance for chaining.
    content.vb: Public Shared Function AddNormFactory(Of TContext As DbContext)(services As IServiceCollection, contextFactory As Func(Of IServiceProvider, TContext)) As IServiceCollection
