  namespace: nORM.Core
  summary: >-
    A node visited during <xref href="nORM.Core.ChangeTracker.TrackGraph(System.Object%2cSystem.Action%7bnORM.Core.EntityEntryGraphNode%7d)" data-throw-if-not-resolved="false"></xref>:

    the entry for the entity currently being processed, the entry it was reached from, and the navigation

    property that was traversed to reach it. The callback assigns <xref href="nORM.Core.EntityEntry.State" data-throw-if-not-resolved="false"></xref> on

    <xref href="nORM.Core.EntityEntryGraphNode.Entry" data-throw-if-not-resolved="false"></xref> to choose how the entity is tracked; leaving it <xref href="nORM.Core.EntityState.Detached" data-throw-if-not-resolved="false"></xref>

    stops the traversal from descending into that entity's own navigations (Entity Framework Core parity).
