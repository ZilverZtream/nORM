    id: ServerUtcNow
    path: src/nORM/Query/NormFunctions.cs
    startLine: 38
  assemblies:
  - nORM
  namespace: nORM.Query
  summary: >-
    Server-side UTC timestamp. Differs from <xref href="System.DateTime.UtcNow" data-throw-if-not-resolved="false"></xref>

    (which the translator constant-folds to the client clock at translation

    time): this stays as a SQL function call so each row evaluation sees

    the database server's clock. Use when the database is the source of

    truth for "now".
  example: []
  syntax:
    content: public static DateTime ServerUtcNow()
    return:
      type: System.DateTime
    content.vb: Public Shared Function ServerUtcNow() As Date
  overload: nORM.Query.NormFunctions.ServerUtcNow*
