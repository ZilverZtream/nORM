    id: ILike
    path: src/nORM/Query/NormFunctions.cs
    startLine: 27
  assemblies:
  - nORM
  namespace: nORM.Query
  summary: >-
    Case-insensitive pattern match. PostgreSQL emits native ILIKE; SQL Server, SQLite,

    and MySQL emit `LOWER(value) LIKE LOWER(pattern)`. As with Like, no automatic

    LIKE-pattern escaping is performed — the caller controls `%` and `_`.
  example: []
  syntax:
    content: public static bool ILike(string value, string pattern)
    parameters:
    - id: value
      type: System.String
    - id: pattern
      type: System.String
    return:
      type: System.Boolean
    content.vb: Public Shared Function ILike(value As String, pattern As String) As Boolean
