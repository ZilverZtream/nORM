  assemblies:
  - nORM
  namespace: nORM.Query
  summary: >-
    Pattern-matches <code class="paramref">value</code> against the SQL LIKE pattern

    <code class="paramref">pattern</code>. Use the underlying provider's wildcard semantics —

    `%` for any sequence, `_` for any single character.
  example: []
  syntax:
    content: >-
      [SqlFunction("({0} LIKE {1})")]

      public static bool Like(string value, string pattern)
    parameters:
    - id: value
      type: System.String
    - id: pattern
      type: System.String
    return:
      type: System.Boolean
    content.vb: >-
      <SqlFunction("({0} LIKE {1})")>

      Public Shared Function [Like](value As String, pattern As String) As Boolean
