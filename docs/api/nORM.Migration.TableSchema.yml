      repo: https://github.com/ZilverZtream/nORM.git
    id: IsTemporal
    path: src/nORM/Migration/SchemaSnapshot.cs
    startLine: 43
  assemblies:
  - nORM
  namespace: nORM.Migration
  summary: >-
    True when the table is versioned by nORM-managed (trigger-emulated) temporal storage.

    Populated by <xref href="nORM.Migration.SchemaSnapshotBuilder.Build(nORM.Core.DbContext)" data-throw-if-not-resolved="false"></xref> when the context has

    temporal versioning enabled in an emulated storage mode. Migration generators mirror

    schema changes onto the table's <code>&lt;Name&gt;_History</code> companion in lock-step and

    re-emit the versioning triggers from the new schema. Provider-native temporal storage

    (e.g. SQL Server system-versioning) propagates schema changes itself and stays unflagged.
  example: []
  syntax:
    content: public bool IsTemporal { get; set; }
    parameters: []
    return:
      type: System.Boolean
    content.vb: Public Property IsTemporal As Boolean
  overload: nORM.Migration.TableSchema.IsTemporal*
