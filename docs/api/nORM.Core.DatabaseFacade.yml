  type: Method
  source:
    remote:
      path: src/nORM/Core/DatabaseFacade.cs
      branch: main
      repo: https://github.com/ZilverZtream/nORM.git
    id: UseTransaction
    path: src/nORM/Core/DatabaseFacade.cs
    startLine: 450
  assemblies:
  - nORM
  namespace: nORM.Core
  summary: >-
    Enlists the context in an externally-created <xref href="System.Data.Common.DbTransaction" data-throw-if-not-resolved="false"></xref>, matching Entity Framework

    Core's <code>Database.UseTransaction</code> — so nORM's commands and <code>SaveChanges</code> run inside a

    transaction begun by raw ADO.NET or another library on the same connection (see

    <xref href="nORM.Core.DatabaseFacade.GetDbConnection" data-throw-if-not-resolved="false"></xref>). The context does NOT take ownership: disposing the returned wrapper

    or the context never disposes the caller's transaction, though committing or rolling it back through

    the wrapper is allowed. Passing <code>null</code> clears the current transaction (without disposing it).

    Because it accepts a provider-specific handle it is disallowed under strict provider mobility.
  example: []
  syntax:
    content: public DbContextTransaction? UseTransaction(DbTransaction? transaction)
    parameters:
    - id: transaction
      type: System.Data.Common.DbTransaction
      description: The externally-managed transaction to enlist, or <code>null</code> to clear.
    return:
      type: nORM.Core.DbContextTransaction
      description: A non-owning <xref href="nORM.Core.DbContextTransaction" data-throw-if-not-resolved="false"></xref> wrapper, or <code>null</code> when clearing.
    content.vb: Public Function UseTransaction(transaction As DbTransaction) As DbContextTransaction
  overload: nORM.Core.DatabaseFacade.UseTransaction*
  exceptions:
  - type: nORM.Core.NormUsageException
    commentId: T:nORM.Core.NormUsageException
    description: A transaction is already active.
  nameWithType.vb: DatabaseFacade.UseTransaction(DbTransaction)
  fullName.vb: nORM.Core.DatabaseFacade.UseTransaction(System.Data.Common.DbTransaction)
  name.vb: UseTransaction(DbTransaction)
