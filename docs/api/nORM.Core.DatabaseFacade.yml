  assemblies:
  - nORM
  namespace: nORM.Core
  summary: >-
    Drops the tables for the context's mapped entities if they exist — the inverse of

    <xref href="nORM.Core.DatabaseFacade.EnsureCreatedAsync(System.Threading.CancellationToken)" data-throw-if-not-resolved="false"></xref> and the model-scoped equivalent of EF Core's <code>EnsureDeleted</code>.

    Like <xref href="nORM.Core.DatabaseFacade.EnsureCreatedAsync(System.Threading.CancellationToken)" data-throw-if-not-resolved="false"></xref> it operates only on the entities configured in the fluent

    model, dropping dependents before principals so foreign keys do not block the drop. Returns

    <code>true</code> when at least one table was dropped, <code>false</code> when none existed.
  example: []
  syntax:
    content: >-
      [RequiresDynamicCode("EnsureDeleted builds a schema snapshot by reflecting over entity mappings; not NativeAOT-compatible. See docs/aot-trimming.md.")]

