  assemblies:
  - nORM
  namespace: nORM.Migration
  summary: >-
    Applies all pending migrations to the MySQL database.

    Acquires an exclusive named advisory lock (<code>GET_LOCK</code>) before reading the pending list,

    preventing concurrent deployers from running the same DDL simultaneously.
  example: []
  syntax:
    content: public Task ApplyMigrationsAsync(CancellationToken ct = default)
    parameters:
