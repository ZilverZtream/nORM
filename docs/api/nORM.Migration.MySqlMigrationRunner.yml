  assemblies:
  - nORM
  namespace: nORM.Migration
  summary: >-
    Acquires a MySQL named advisory lock using <code>GET_LOCK(name, timeout)</code>.

    Returns 1 if acquired, 0 if timeout, NULL on error. Throws

    <xref href="System.InvalidOperationException" data-throw-if-not-resolved="false"></xref> on timeout or error so the caller is

    not silently blocked.
  example: []
  syntax:
    content: protected virtual Task AcquireAdvisoryLockAsync(CancellationToken ct)
