    id: TrackGraph
    path: src/nORM/Core/ChangeTracker.TrackGraph.cs
    startLine: 29
  assemblies:
  - nORM
  namespace: nORM.Core
  summary: >-
    Begins tracking <code class="paramref">rootEntity</code> and every entity reachable from it through

    navigation properties, invoking <code class="paramref">callback</code> once for each entity discovered that

    is not already tracked (Entity Framework Core parity). The callback assigns

    <xref href="nORM.Core.EntityEntry.State" data-throw-if-not-resolved="false"></xref> on the node's <xref href="nORM.Core.EntityEntryGraphNode.Entry" data-throw-if-not-resolved="false"></xref> to choose

    how that entity is tracked — a common pattern is

    <code>node =&gt; node.Entry.State = node.Entry.IsKeySet ? EntityState.Modified : EntityState.Added</code>.

    An entity the callback leaves <xref href="nORM.Core.EntityState.Detached" data-throw-if-not-resolved="false"></xref> is not tracked and the traversal

    does not descend into its navigations; an entity already tracked by the context is skipped and not

    traversed through, so a cyclic graph always terminates. No lazy loading is enabled during the walk,

    so traversing the graph never triggers a database query — only the navigations the caller populated

    on the (typically disconnected) graph are followed.
  example: []
  syntax:
    content: >-
      [RequiresDynamicCode("TrackGraph reads navigation properties and resolves mappings via reflection; not NativeAOT-compatible.")]

