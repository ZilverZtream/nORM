  assemblies:
  - nORM
  namespace: nORM.Core
  summary: >-
    Forces detection of changes made to tracked entities since they were loaded or last saved,

    updating each entry's <xref href="nORM.Core.EntityEntry.State" data-throw-if-not-resolved="false"></xref> — matching EF Core's

    <code>ChangeTracker.DetectChanges()</code>. SaveChanges runs this automatically; call it explicitly

    only when you need up-to-date states before then (e.g. before <xref href="nORM.Core.ChangeTracker.HasChanges" data-throw-if-not-resolved="false"></xref> or

    enumerating <xref href="nORM.Core.ChangeTracker.Entries" data-throw-if-not-resolved="false"></xref>).
