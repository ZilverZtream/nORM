    - id: rootEntity
      type: System.Object
      description: The root of the entity graph to track.
    - id: state
      type: '{TState}'
      description: A value passed to <code class="paramref">callback</code> on every node.
    - id: callback
      type: System.Func{nORM.Core.EntityEntryGraphNode{{TState}},System.Boolean}
      description: Invoked per untracked entity; sets its state and returns whether to descend.
    typeParameters:
    - id: TState
      description: Type of the state value threaded to every node.
    content.vb: >-
