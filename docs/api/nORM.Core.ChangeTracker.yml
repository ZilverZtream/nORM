  assemblies:
  - nORM
  namespace: nORM.Core
  summary: >-
    Stateful <xref href="nORM.Core.ChangeTracker.TrackGraph(System.Object%2cSystem.Action%7bnORM.Core.EntityEntryGraphNode%7d)" data-throw-if-not-resolved="false"></xref> (Entity Framework Core

    parity): begins tracking <code class="paramref">rootEntity</code> and every entity reachable through its

    navigations, threading <code class="paramref">state</code> to each node and invoking <code class="paramref">callback</code>

    once per untracked entity discovered. The callback assigns <xref href="nORM.Core.EntityEntry.State" data-throw-if-not-resolved="false"></xref> on the

    node's <xref href="nORM.Core.EntityEntryGraphNode%601.Entry" data-throw-if-not-resolved="false"></xref> to choose how the entity is tracked, and

    returns whether the traversal should descend into that entity's own navigations — returning

    <code>false</code> prunes the subtree independent of the tracked state. An entity already tracked by the

    context is skipped and not traversed through, so a cyclic graph always terminates; no lazy loading

    is enabled during the walk.
  example: []
  syntax:
    content: >-
      [RequiresDynamicCode("TrackGraph reads navigation properties and resolves mappings via reflection; not NativeAOT-compatible.")]

      [RequiresUnreferencedCode("TrackGraph reflects over navigation properties; trimming may remove the required members.")]

      public void TrackGraph<TState>(object rootEntity, TState state, Func<EntityEntryGraphNode<TState>, bool> callback)
