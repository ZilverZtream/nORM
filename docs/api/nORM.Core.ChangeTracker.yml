  assemblies:
  - nORM
  namespace: nORM.Core
  summary: Removes all tracked entity entries and resets the change tracker to an empty state.
  remarks: >-
    This method is not synchronized with <xref href="nORM.Core.ChangeTracker._trackLock" data-throw-if-not-resolved="false"></xref>. Since

    <xref href="nORM.Core.DbContext" data-throw-if-not-resolved="false"></xref> is single-threaded by design, callers must not invoke

    <xref href="nORM.Core.ChangeTracker.Clear" data-throw-if-not-resolved="false"></xref> concurrently with <xref href="nORM.Core.ChangeTracker.Track(System.Object%2cnORM.Core.EntityState%2cnORM.Mapping.TableMapping)" data-throw-if-not-resolved="false"></xref> or <xref href="nORM.Core.ChangeTracker.Remove(System.Object%2cSystem.Boolean)" data-throw-if-not-resolved="false"></xref>.
