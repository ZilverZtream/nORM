    id: AcceptAllChanges
    path: src/nORM/Core/ChangeTracker.cs
    startLine: 600
  assemblies:
  - nORM
  namespace: nORM.Core
  summary: >-
    Accepts all changes: after running change detection, every Added or Modified entry becomes

    <xref href="nORM.Core.EntityState.Unchanged" data-throw-if-not-resolved="false"></xref> with its current values as the new baseline, and every Deleted

    entry is detached — matching EF Core's <code>ChangeTracker.AcceptAllChanges</code>. Use it to tell the

    tracker that the tracked entities now mirror the database after persisting them out of band (for

    example via raw SQL). Each entry is processed by its own state, without cascading.
  example: []
  syntax:
    content: public void AcceptAllChanges()
    content.vb: Public Sub AcceptAllChanges()
  overload: nORM.Core.ChangeTracker.AcceptAllChanges*
