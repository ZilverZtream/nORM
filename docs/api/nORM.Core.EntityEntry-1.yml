    id: State
    path: src/nORM/Core/EntityEntryOfT.cs
    startLine: 36
  assemblies:
  - nORM
  namespace: nORM.Core
  summary: >-
    Gets or sets the current <xref href="nORM.Core.EntityState" data-throw-if-not-resolved="false"></xref> of the tracked entity within the context.

    Assigning a new state performs the corresponding tracker transition — setting

    <xref href="nORM.Core.EntityState.Modified" data-throw-if-not-resolved="false"></xref> flags the entity for a full UPDATE, <xref href="nORM.Core.EntityState.Deleted" data-throw-if-not-resolved="false"></xref>

    for a DELETE (or detaches a never-inserted <xref href="nORM.Core.EntityState.Added" data-throw-if-not-resolved="false"></xref> entity),

    <xref href="nORM.Core.EntityState.Unchanged" data-throw-if-not-resolved="false"></xref> accepts the current values as the clean baseline, and

    <xref href="nORM.Core.EntityState.Detached" data-throw-if-not-resolved="false"></xref> stops tracking the entity — mirroring

    <code>DbContext.Update</code>/<code>Remove</code>/<code>Attach</code>. Internal bookkeeping uses

    <xref href="nORM.Core.EntityEntry.SetStateInternal(nORM.Core.EntityState)" data-throw-if-not-resolved="false"></xref>, which assigns the field without any transition side effects.
  example: []
  syntax:
    content: public EntityState State { get; set; }
    parameters: []
    return:
      type: nORM.Core.EntityState
    content.vb: Public Property State As EntityState
  overload: nORM.Core.EntityEntry`1.State*
  nameWithType.vb: EntityEntry(Of TEntity).State
  fullName.vb: nORM.Core.EntityEntry(Of TEntity).State
