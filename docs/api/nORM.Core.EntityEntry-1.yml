  assemblies:
  - nORM
  namespace: nORM.Core
  summary: >-
    A strongly-typed view over a tracked entity's <xref href="nORM.Core.EntityEntry" data-throw-if-not-resolved="false"></xref> (EF Core parity for

    <code>EntityEntry&lt;TEntity&gt;</code>), obtained from <xref href="nORM.Core.DbContext.Entry%60%601(%60%600)" data-throw-if-not-resolved="false"></xref>. It

    surfaces the full untyped <xref href="nORM.Core.EntityEntry" data-throw-if-not-resolved="false"></xref> API and adds a lambda-based

    <xref href="nORM.Core.EntityEntry%601.Property%60%601(System.Linq.Expressions.Expression%7bSystem.Func%7b%600%2c%60%600%7d%7d)" data-throw-if-not-resolved="false"></xref> plus a typed

    <xref href="nORM.Core.EntityEntry%601.Entity" data-throw-if-not-resolved="false"></xref>, so property state can be read or set without stringly-typed names — e.g.

    <code>ctx.Entry(order).Property(o =&gt; o.Total).IsModified = true</code>. It converts implicitly to

    <xref href="nORM.Core.EntityEntry" data-throw-if-not-resolved="false"></xref>, and the underlying entry is also available via <xref href="nORM.Core.EntityEntry%601.Entry" data-throw-if-not-resolved="false"></xref>.
