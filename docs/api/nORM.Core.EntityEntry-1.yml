  summary: >-
    Reads the entity's current values straight from its database row as a detached

    <xref href="nORM.Core.PropertyValues" data-throw-if-not-resolved="false"></xref> snapshot, without disturbing the tracked entity or its state —

    mirroring EF's <code>GetDatabaseValues</code>. Returns <code>null</code> when the row no longer exists. The

    canonical use is resolving a <xref href="nORM.Core.DbConcurrencyException" data-throw-if-not-resolved="false"></xref>: compare the returned store

    values against <xref href="nORM.Core.EntityEntry.CurrentValues" data-throw-if-not-resolved="false"></xref>/<xref href="nORM.Core.EntityEntry.OriginalValues" data-throw-if-not-resolved="false"></xref>, then

    <xref href="nORM.Core.PropertyValues.SetValues(System.Object)" data-throw-if-not-resolved="false"></xref> the chosen winner back before retrying the save.

    Throws when the entry is detached or not associated with a context.
