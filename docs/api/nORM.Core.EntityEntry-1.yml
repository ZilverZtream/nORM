  assemblies:
  - nORM
  namespace: nORM.Core
  summary: >-
    Gets a value indicating whether the entity's primary key has been assigned a non-default value

    (Entity Framework Core parity). Any key column still at its CLR default (0, <xref href="System.Guid.Empty" data-throw-if-not-resolved="false"></xref>,

    or <code>null</code>) makes the key unset — so a store-generated key reads as unset until the database

    assigns it. A keyless entity, or a detached entry that has released its entity, is always unset.
  example: []
  syntax:
    content: public bool IsKeySet { get; }
    parameters: []
    return:
      type: System.Boolean
    content.vb: Public ReadOnly Property IsKeySet As Boolean
  overload: nORM.Core.EntityEntry`1.IsKeySet*
  nameWithType.vb: EntityEntry(Of TEntity).IsKeySet
  fullName.vb: nORM.Core.EntityEntry(Of TEntity).IsKeySet
