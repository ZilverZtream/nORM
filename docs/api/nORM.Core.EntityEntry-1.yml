  summary: >-
    A strongly-typed view over a tracked entity's <xref href="nORM.Core.EntityEntry" data-throw-if-not-resolved="false"></xref>
    (Entity Framework Core parity for EntityEntry&lt;TEntity&gt;), obtained from
    <xref href="nORM.Core.DbContext" data-throw-if-not-resolved="false"></xref>.Entry&lt;TEntity&gt;. It surfaces the full
    untyped EntityEntry API and adds a lambda-based Property selector plus a typed Entity, so property state can be
    read or set without stringly-typed names. It converts implicitly to EntityEntry.
  syntax:
    content: 'public sealed class EntityEntry<TEntity> where TEntity : class'
    typeParameters:
    - id: TEntity
      description: The tracked entity's CLR type.
    content.vb: Public NotInheritable Class EntityEntry(Of TEntity)
  inheritance:
