    path: src/nORM/Providers/SqlServerProvider.cs
    startLine: 91
  assemblies:
  - nORM
  namespace: nORM.Providers
  summary: Maximum length of a single SQL statement supported by SQL Server.
  remarks: >-
    SQL Server supports batch sizes up to 65,536 x 4,096 bytes of network packet data.

    The previous value of 8,000 was incorrectly derived from the max row size, not the

    max query text size. SQL Server's actual query text limit is governed by

    max_recursion and memory, not a fixed character count. Using 256 MB as a safe ceiling

    avoids rejecting valid wide or complex queries.
  example: []
  syntax:
    content: public override int MaxSqlLength { get; }
    parameters: []
    return:
      type: System.Int32
    content.vb: Public Overrides ReadOnly Property MaxSqlLength As Integer
  overridden: nORM.Providers.DatabaseProvider.MaxSqlLength
