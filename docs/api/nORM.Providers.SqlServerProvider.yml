  assemblies:
  - nORM
  namespace: nORM.Providers
  summary: >-
    Releasing a savepoint is a no-op on SQL Server: the engine has no RELEASE SAVEPOINT statement and

    releases savepoints automatically when the transaction commits (rolling back to an outer savepoint

    still discards inner ones). This matches EF Core's SQL Server behaviour — the work done since the

    savepoint is kept and the savepoint simply stops being an explicit rollback target.
  example: []
  syntax:
    content: public override Task ReleaseSavepointAsync(DbTransaction transaction, string name, CancellationToken ct = default)
    parameters:
    - id: transaction
      type: System.Data.Common.DbTransaction
      description: The transaction containing the savepoint.
    - id: name
      type: System.String
      description: Name of the savepoint to release (unused; SQL Server auto-releases).
    - id: ct
      type: System.Threading.CancellationToken
      description: Cancellation token.
    return:
      type: System.Threading.Tasks.Task
    content.vb: Public Overrides Function ReleaseSavepointAsync(transaction As DbTransaction, name As String, ct As CancellationToken = Nothing) As Task
