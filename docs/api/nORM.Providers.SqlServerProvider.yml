  assemblies:
  - nORM
  namespace: nORM.Providers
  summary: >-
    SQL Server ignores trailing spaces in equality comparisons, so

    <code>'   ' = ''</code> is TRUE. <code>DATALENGTH</code> counts raw bytes and is

    not affected by padding, making it the reliable empty-string test.

    For NVARCHAR an empty string has DATALENGTH = 0; a whitespace-only

    string has DATALENGTH &gt; 0.
  example: []
  syntax:
    content: public override string IsNullOrEmptySql(string colSql)
    parameters:
    - id: colSql
      type: System.String
    return:
      type: System.String
