  assemblies:
  - nORM
  namespace: nORM.Core
  summary: >-
    Represents the change tracking information for a single entity instance.

    An <xref href="nORM.Core.EntityEntry" data-throw-if-not-resolved="false"></xref> keeps the original values and state required to

    compute database updates when <code>SaveChanges</code> is invoked.
  remarks: >-
    PERFORMANCE OPTIMIZATION: Deferred initialization of tracking arrays.

    Arrays are null until <xref href="nORM.Core.EntityEntry.InitializeTracking" data-throw-if-not-resolved="false"></xref> is called, reducing

    memory overhead for read-only or short-lived entities (approximately 200-500

    bytes per entity depending on column count).
  example: []
  syntax:
    content: public class EntityEntry
    content.vb: Public Class EntityEntry
