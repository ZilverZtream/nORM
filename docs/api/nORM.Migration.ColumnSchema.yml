    id: ClrType
    path: src/nORM/Migration/SchemaSnapshot.cs
    startLine: 90
  assemblies:
  - nORM
  namespace: nORM.Migration
  summary: >-
    Full CLR type name of the column (e.g. <code>System.Int32</code>).

    An empty string is a recognizable placeholder meaning "unknown/unresolved type";

    callers that produce <xref href="nORM.Migration.ColumnSchema" data-throw-if-not-resolved="false"></xref> instances should always populate this

    field — leaving it empty will cause all four SQL generators to fall back to their

    default type (e.g. NVARCHAR(MAX) for SQL Server) and may suppress spurious alter

    detections because two columns with an empty ClrType compare equal.
  example: []
  syntax:
    content: public string ClrType { get; set; }
    parameters: []
    return:
      type: System.String
    content.vb: Public Property ClrType As String
  overload: nORM.Migration.ColumnSchema.ClrType*
