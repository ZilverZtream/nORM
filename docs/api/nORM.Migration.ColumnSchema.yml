  assemblies:
  - nORM
  namespace: nORM.Migration
  summary: >-
    When <xref href="nORM.Migration.ColumnSchema.IsIdentity" data-throw-if-not-resolved="false"></xref>, true if the identity column HONORS an explicitly-supplied value

    (store-generated only when the value is default) — the store-generated-key convention (EF parity).

    Drives PostgreSQL <code>GENERATED BY DEFAULT AS IDENTITY</code> vs the strict <code>GENERATED ALWAYS</code>, and

    SQL Server's IDENTITY_INSERT wrap for explicit rows. False for a strict [DatabaseGenerated(Identity)].
  example: []
  syntax:
    content: public bool IdentityByDefault { get; set; }
    parameters: []
    return:
      type: System.Boolean
    content.vb: Public Property IdentityByDefault As Boolean
  overload: nORM.Migration.ColumnSchema.IdentityByDefault*
