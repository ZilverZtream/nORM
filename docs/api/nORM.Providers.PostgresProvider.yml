  assemblies:
  - nORM
  namespace: nORM.Providers
  summary: Initializes a new instance of the <xref href="nORM.Providers.PostgresProvider" data-throw-if-not-resolved="false"></xref> class.
  remarks: >-
    <p>

    <b>Runtime dependency:</b> This provider uses PostgreSQL via reflection and requires

    <code>Npgsql</code> to be installed in the consuming application.

    Add it to your project:


    <pre><code class="lang-csharp">dotnet add package Npgsql</code></pre>


    A clear <xref href="System.InvalidOperationException" data-throw-if-not-resolved="false"></xref> is thrown at runtime if Npgsql is not present.

    </p>
  example: []
  syntax:
