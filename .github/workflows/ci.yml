name: CI

on:
  push:
    branches: [ "main" ]
  pull_request:
    branches: [ "main" ]

jobs:
  # ── Core test matrix: SQLite-only (always runs, no external infra required) ─
  test:
    name: Build and Test (${{ matrix.os }})
    strategy:
      fail-fast: false
      matrix:
        os: [ ubuntu-latest, windows-latest ]

    runs-on: ${{ matrix.os }}

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup .NET 8
        uses: actions/setup-dotnet@v4
        with:
          global-json-file: global.json

      - name: Show .NET SDK
        run: dotnet --info

      - name: Validate .NET SDK
        shell: pwsh
        run: |
          $expected = (Get-Content global.json | ConvertFrom-Json).sdk.version
          $actual = dotnet --version
          if ($actual -ne $expected) { throw "Expected .NET SDK $expected from global.json but found $actual." }
          if ($actual -match '(preview|rc|alpha|beta)') { throw "Preview .NET SDK is not allowed for v1 release gates: $actual." }

      - name: Restore dependencies
        run: dotnet restore tests/

      - name: Build
        run: dotnet build tests/ --no-restore --nologo -v quiet

      - name: Test
        run: >
          dotnet test tests/ --no-build --nologo
          --logger "trx;LogFileName=test-results.trx"
          --logger "console;verbosity=normal"

      - name: Upload test results
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: test-results-${{ matrix.os }}
          path: "**/*.trx"
          retention-days: 7

  # ── P1 gate: live MySQL provider parity (ubuntu only, service container) ────
  # Gate 4.5 requirement: mandatory live provider matrix, no optional skip path
  # for core parity scenarios. The NORM_TEST_MYSQL env var activates live tests;
  # this job always sets it so the parity tests are never skipped in CI.
  release-gate-quick:
    name: v1 Release Gate (quick)
    runs-on: windows-latest

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup .NET 8
        uses: actions/setup-dotnet@v4
        with:
          global-json-file: global.json

      - name: Show .NET SDK
        run: dotnet --info

      - name: Validate .NET SDK
        shell: pwsh
        run: |
          $expected = (Get-Content global.json | ConvertFrom-Json).sdk.version
          $actual = dotnet --version
          if ($actual -ne $expected) { throw "Expected .NET SDK $expected from global.json but found $actual." }
          if ($actual -match '(preview|rc|alpha|beta)') { throw "Preview .NET SDK is not allowed for v1 release gates: $actual." }

      - name: Run quick release gate
        shell: pwsh
        run: ./eng/v1-release-gate.ps1 -Mode quick -SkipBenchmark

      - name: Upload release gate test results
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: release-gate-test-results
          path: "tests/TestResults/**/*.trx"
          retention-days: 7

      - name: Upload package artifacts
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: release-gate-packages
          path: |
            src/bin/Release/*.nupkg
            src/bin/Release/*.snupkg
            src/dotnet-norm/bin/Release/*.nupkg
            src/dotnet-norm/bin/Release/*.snupkg
          retention-days: 7

  test-mysql:
    name: Live MySQL Provider Parity
    runs-on: ubuntu-latest

    services:
      mysql:
        image: mysql:8.0
        env:
          MYSQL_ROOT_PASSWORD: normtest
          MYSQL_DATABASE: normtest
        ports:
          - 3306:3306
        options: >-
          --health-cmd="mysqladmin ping --silent"
          --health-interval=10s
          --health-timeout=5s
          --health-retries=5

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup .NET 8
        uses: actions/setup-dotnet@v4
        with:
          global-json-file: global.json

      - name: Show .NET SDK
        run: dotnet --info

      - name: Validate .NET SDK
        shell: pwsh
        run: |
          $expected = (Get-Content global.json | ConvertFrom-Json).sdk.version
          $actual = dotnet --version
          if ($actual -ne $expected) { throw "Expected .NET SDK $expected from global.json but found $actual." }
          if ($actual -match '(preview|rc|alpha|beta)') { throw "Preview .NET SDK is not allowed for v1 release gates: $actual." }

      - name: Restore dependencies
        run: dotnet restore tests/

      - name: Build
        run: dotnet build tests/ --no-restore --nologo -v quiet

      - name: Wait for MySQL
        run: |
          for i in $(seq 1 30); do
            mysqladmin ping -h 127.0.0.1 -u root -pnormtest --silent && break
            echo "Waiting for MySQL... ($i/30)"
            sleep 2
          done

      - name: Test (live MySQL parity)
        shell: pwsh
        env:
          NORM_TEST_MYSQL: "Server=127.0.0.1;Port=3306;Database=normtest;User=root;Password=normtest;AllowPublicKeyRetrieval=True"
        run: ./eng/v1-release-gate.ps1 -Mode live -MinLiveProviders 1 -SkipBenchmark

      - name: Upload MySQL test results
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: test-results-mysql
          path: "**/*.trx"
          retention-days: 7

  # ── P1 gate: live PostgreSQL provider parity ─────────────────────────────────
  test-postgres:
    name: Live PostgreSQL Provider Parity
    runs-on: ubuntu-latest

    services:
      postgres:
        image: postgres:15
        env:
          POSTGRES_PASSWORD: normtest
          POSTGRES_DB: normtest
        ports:
          - 5432:5432
        options: >-
          --health-cmd="pg_isready -U postgres"
          --health-interval=10s
          --health-timeout=5s
          --health-retries=5

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup .NET 8
        uses: actions/setup-dotnet@v4
        with:
          global-json-file: global.json

      - name: Show .NET SDK
        run: dotnet --info

      - name: Validate .NET SDK
        shell: pwsh
        run: |
          $expected = (Get-Content global.json | ConvertFrom-Json).sdk.version
          $actual = dotnet --version
          if ($actual -ne $expected) { throw "Expected .NET SDK $expected from global.json but found $actual." }
          if ($actual -match '(preview|rc|alpha|beta)') { throw "Preview .NET SDK is not allowed for v1 release gates: $actual." }

      - name: Restore dependencies
        run: dotnet restore tests/

      - name: Build
        run: dotnet build tests/ --no-restore --nologo -v quiet

      - name: Test (live Postgres parity)
        shell: pwsh
        env:
          NORM_TEST_POSTGRES: "Host=127.0.0.1;Port=5432;Database=normtest;Username=postgres;Password=normtest"
        run: ./eng/v1-release-gate.ps1 -Mode live -MinLiveProviders 1 -SkipBenchmark

      - name: Upload Postgres test results
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: test-results-postgres
          path: "**/*.trx"
          retention-days: 7

  # ── P1 gate: live SQL Server provider parity ──────────────────────────────────
  test-sqlserver:
    name: Live SQL Server Provider Parity
    runs-on: ubuntu-latest

    services:
      sqlserver:
        image: mcr.microsoft.com/mssql/server:2022-latest
        env:
          ACCEPT_EULA: "Y"
          SA_PASSWORD: "NormTest!2024"
          MSSQL_PID: "Developer"
        ports:
          - 1433:1433
        options: >-
          --health-cmd="/opt/mssql-tools18/bin/sqlcmd -S localhost -U sa -P 'NormTest!2024' -Q 'SELECT 1' -No"
          --health-interval=15s
          --health-timeout=10s
          --health-retries=8

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup .NET 8
        uses: actions/setup-dotnet@v4
        with:
          global-json-file: global.json

      - name: Show .NET SDK
        run: dotnet --info

      - name: Validate .NET SDK
        shell: pwsh
        run: |
          $expected = (Get-Content global.json | ConvertFrom-Json).sdk.version
          $actual = dotnet --version
          if ($actual -ne $expected) { throw "Expected .NET SDK $expected from global.json but found $actual." }
          if ($actual -match '(preview|rc|alpha|beta)') { throw "Preview .NET SDK is not allowed for v1 release gates: $actual." }

      - name: Restore dependencies
        run: dotnet restore tests/

      - name: Build
        run: dotnet build tests/ --no-restore --nologo -v quiet

      - name: Test (live SQL Server parity)
        shell: pwsh
        env:
          NORM_TEST_SQLSERVER: "Server=127.0.0.1,1433;Database=normtest;User Id=sa;Password=NormTest!2024;TrustServerCertificate=True"
        run: ./eng/v1-release-gate.ps1 -Mode live -MinLiveProviders 1 -SkipBenchmark

      - name: Upload SQL Server test results
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: test-results-sqlserver
          path: "**/*.trx"
          retention-days: 7
